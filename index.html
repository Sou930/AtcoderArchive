
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AtCoder Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/one-light.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/c.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/ruby.min.js"></script>
  <style>
    :root {
      --bg:       #f7f4ef;
      --surface:  #ffffff;
      --panel:    #f1ede6;
      --border:   #e3dcd2;
      --accent:   #c9826b;
      --accent-s: #f0e9e3;
      --text:     #3a3028;
      --text-2:   #6b5f54;
      --muted:    #a89b8e;
      --shadow:   rgba(90,70,50,0.08);
      --shadow-m: rgba(90,70,50,0.14);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    header {
      position: relative; z-index: 10;
      padding: 2.2rem 3rem 1.8rem;
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      box-shadow: 0 2px 12px var(--shadow);
    }
    .header-inner {
      max-width: 1280px; margin: 0 auto;
      display: flex; align-items: flex-end;
      justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    }
    h1 {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 700; letter-spacing: -0.02em; color: var(--text);
      display: flex; align-items: center; gap: 0.55rem;
    }
    .dot-accent {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
      box-shadow: 0 0 0 3px var(--accent-s);
    }
    .tagline { font-size: 0.76rem; color: var(--muted); margin-top: 0.3rem; }
    .stats-row { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .stat-pill {
      background: var(--panel); border: 1.5px solid var(--border);
      border-radius: 100px; padding: 0.38rem 1rem;
      font-size: 0.78rem; display: flex; align-items: center; gap: 0.45rem;
    }
    .stat-pill strong { font-weight: 600; color: var(--accent); }
    .stat-pill em { color: var(--muted); font-style: normal; font-size: 0.7rem; }

    /* Layout */
    .app {
      position: relative; z-index: 1;
      max-width: 1280px; margin: 0 auto;
      display: grid; grid-template-columns: 230px 1fr;
      gap: 1.5rem; padding: 1.8rem 2rem;
      align-items: start;
    }

    /* Sidebar */
    aside {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px; padding: 1.2rem;
      box-shadow: 0 2px 10px var(--shadow);
      position: sticky; top: 1.5rem;
      max-height: calc(100vh - 3rem); overflow-y: auto;
    }
    .sec-label {
      font-size: 0.6rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.13em;
      color: var(--muted); margin-bottom: 0.55rem;
      padding-left: 0.3rem;
    }
    .sec-label:not(:first-child) { margin-top: 1.2rem; }
    .search-wrap { position: relative; margin-bottom: 0; }
    .search-wrap::before {
      content: '⌕'; position: absolute;
      left: 0.7rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 1rem; pointer-events: none;
    }
    .search-box {
      width: 100%; background: var(--panel);
      border: 1.5px solid var(--border); color: var(--text);
      font-family: 'Outfit', sans-serif; font-size: 0.82rem;
      padding: 0.48rem 0.75rem 0.48rem 2rem;
      border-radius: 10px; outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-s); }
    .search-box::placeholder { color: var(--muted); }
    .filter-group { display: flex; flex-direction: column; gap: 0.18rem; }
    .filter-btn {
      background: none; border: 1.5px solid transparent;
      color: var(--text-2); font-family: 'Outfit', sans-serif;
      font-size: 0.8rem; padding: 0.35rem 0.6rem;
      text-align: left; border-radius: 9px; cursor: pointer;
      display: flex; align-items: center; gap: 0.5rem;
      transition: all 0.14s; white-space: nowrap; overflow: hidden;
    }
    .filter-btn:hover { background: var(--panel); color: var(--text); }
    .filter-btn.active {
      background: var(--accent-s);
      border-color: rgba(201,130,107,0.4); color: var(--accent); font-weight: 500;
    }
    .lang-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .ccount {
      margin-left: auto; font-size: 0.62rem;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 100px; padding: 0.05rem 0.4rem; color: var(--muted);
    }

    /* Main */
    main { min-width: 0; }
    .toolbar {
      display: flex; align-items: center; gap: 0.8rem;
      margin-bottom: 1.1rem; flex-wrap: wrap;
    }
    .result-info { font-size: 0.76rem; color: var(--muted); }
    .result-info strong { color: var(--text); font-weight: 600; }
    .sort-wrap {
      margin-left: auto; display: flex;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .sort-btn {
      background: none; border: none; border-right: 1px solid var(--border);
      color: var(--muted); font-family: 'Outfit', sans-serif;
      font-size: 0.74rem; font-weight: 500;
      padding: 0.36rem 0.85rem; cursor: pointer; transition: all 0.14s;
    }
    .sort-btn:last-child { border-right: none; }
    .sort-btn:hover { background: var(--panel); color: var(--text); }
    .sort-btn.active { background: var(--accent); color: #fff; }

    /* Cards */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px,1fr)); gap: 0.9rem; }
    .card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; overflow: hidden; cursor: pointer;
      transition: border-color 0.18s, transform 0.16s, box-shadow 0.18s;
      animation: rise 0.32s ease both;
    }
    @keyframes rise { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .card:hover {
      border-color: var(--accent); transform: translateY(-3px);
      box-shadow: 0 8px 28px var(--shadow-m);
    }
    .card-top {
      padding: 0.85rem 1rem 0.65rem;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem;
    }
    .card-name { font-size: 0.86rem; font-weight: 600; color: var(--text); word-break: break-all; line-height: 1.3; }
    .card-sub  { font-size: 0.68rem; color: var(--muted); margin-top: 0.12rem; }
    .lang-chip {
      flex-shrink: 0; font-size: 0.6rem; font-weight: 600;
      letter-spacing: 0.04em; padding: 0.16rem 0.52rem; border-radius: 100px;
    }
    .card-preview {
      margin: 0 0.75rem;
      background: var(--panel); border-radius: 8px;
      padding: 0.55rem 0.7rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.64rem; line-height: 1.55;
      color: var(--text-2); max-height: 68px; overflow: hidden; white-space: pre;
      mask-image: linear-gradient(180deg,#000 40%,transparent);
    }
    .ws-prev {
      display: flex; align-items: center; justify-content: center;
      height: 58px; color: var(--muted); font-family: 'Outfit', sans-serif;
      font-size: 0.72rem; font-style: italic; white-space: normal;
      mask-image: none; border: 1.5px dashed var(--border);
    }
    .bf-prev { color: #8c7ab5; }
    .card-footer {
      padding: 0.55rem 1rem 0.7rem;
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.66rem; color: var(--muted);
    }
    .ctag {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 100px; padding: 0.1rem 0.48rem;
      font-size: 0.63rem; font-weight: 500; color: var(--text-2);
    }

    /* Modal */
    .backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(55,40,30,0.42); backdrop-filter: blur(6px);
      z-index: 200; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .backdrop.open { display: flex; }
    .modal {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 18px; width: 100%; max-width: 820px; max-height: 88vh;
      display: flex; flex-direction: column;
      box-shadow: 0 24px 80px rgba(60,45,35,0.22);
      animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1); overflow: hidden;
    }
    @keyframes popIn { from{opacity:0;transform:scale(0.94) translateY(8px)} to{opacity:1;transform:none} }
    .modal-header {
      padding: 1rem 1.3rem; border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0;
      background: var(--panel);
    }
    .modal-info { flex: 1; min-width: 0; }
    .modal-fname {
      font-size: 0.95rem; font-weight: 600; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .modal-meta { font-size: 0.68rem; color: var(--muted); margin-top: 0.1rem; }
    .modal-acts { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .act-btn {
      background: var(--surface); border: 1.5px solid var(--border);
      color: var(--text-2); font-family: 'Outfit', sans-serif;
      font-size: 0.74rem; font-weight: 500; padding: 0.36rem 0.85rem;
      border-radius: 9px; cursor: pointer; transition: all 0.14s;
    }
    .act-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-s); }
    .act-btn.x:hover { border-color: #c96b6b; color: #c96b6b; background: #fdf0f0; }
    .modal-body { overflow-y: auto; flex: 1; background: #faf9f7; }
    .modal-body pre { margin: 0; border-radius: 0; background: #faf9f7 !important; }
    .modal-body code.hljs {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 0.8rem !important; line-height: 1.78 !important;
      padding: 1.4rem 1.6rem !important; background: #faf9f7 !important;
    }

    /* Brainfuck */
    .bf-view {
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
      line-height: 1.9; padding: 1.4rem 1.6rem; white-space: pre-wrap;
      word-break: break-all; background: #faf9f7;
    }
    .bf-view .bf-cmd { font-weight: 600; }

    /* Whitespace */
    .ws-legend {
      display: flex; gap: 1rem; padding: 0.6rem 1.5rem;
      border-bottom: 1px solid var(--border); background: var(--panel);
      font-size: 0.7rem; color: var(--muted); flex-wrap: wrap; align-items: center;
    }
    .ws-legend span { display: flex; align-items: center; gap: 0.3rem; }
    .ws-view {
      font-family: 'JetBrains Mono', monospace; font-size: 0.78rem;
      line-height: 2.1; padding: 1.4rem 1.6rem; background: #faf9f7;
    }
    .S  { background: #dff0e8; border-radius: 3px; padding: 1px 4px; color: #7aab8c; }
    .T  { background: #e8eef7; border-radius: 3px; padding: 1px 4px; color: #7a9dbf; }
    .LF { color: var(--muted); }
    .OT { color: #d4ccc0; text-decoration: line-through; }

    /* States */
    .state-box {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 5rem 2rem; gap: 1rem;
      color: var(--muted); font-size: 0.82rem; text-align: center;
    }
    .spinner {
      width: 26px; height: 26px; border: 2.5px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-card {
      background: #fff8f7; border: 1.5px solid #f0d0c8; border-radius: 14px;
      padding: 1.3rem 1.5rem; font-size: 0.79rem; color: #a0503a;
      line-height: 1.85; display: none; margin-bottom: 1rem;
    }
    .error-card code {
      font-family: 'JetBrains Mono', monospace; background: var(--panel);
      border-radius: 6px; padding: 0.5rem 0.8rem; display: block;
      margin: 0.35rem 0; color: var(--text); font-size: 0.74rem;
    }

    @media (max-width: 720px) {
      header { padding: 1.4rem; }
      .app { grid-template-columns: 1fr; padding: 1rem; }
      aside { position: static; max-height: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1><span class="dot-accent"></span> AtCoder Archive</h1>
      <p class="tagline">My solved problem collection</p>
    </div>
    <div class="stats-row">
      <div class="stat-pill"><strong id="totalCount">—</strong><em>solutions</em></div>
      <div class="stat-pill"><strong id="contestCount">—</strong><em>contests</em></div>
      <div class="stat-pill"><strong id="langCount">—</strong><em>languages</em></div>
    </div>
  </div>
</header>

<div class="app">
  <aside>
    <div class="sec-label">Search</div>
    <div class="search-wrap">
      <input class="search-box" id="searchBox" type="text" placeholder="abc001, a, brainfuck…">
    </div>

    <div class="sec-label">Language</div>
    <div class="filter-group" id="langFilters">
      <button class="filter-btn active" data-lang="all">
        <span class="lang-dot" style="background:var(--muted)"></span>All
      </button>
    </div>

    <div class="sec-label">Contest</div>
    <div class="filter-group" id="contestList"></div>
  </aside>

  <main>
    <div class="error-card" id="errorCard"></div>
    <div class="toolbar" id="toolbar" style="display:none">
      <span class="result-info" id="resultInfo"></span>
      <div class="sort-wrap">
        <button class="sort-btn active" data-sort="name">Name ↕</button>
        <button class="sort-btn" data-sort="lang">Lang</button>
        <button class="sort-btn" data-sort="contest">Contest</button>
      </div>
    </div>
    <div id="mainContent" class="state-box">
      <div class="spinner"></div>
      <span>Loading archive…</span>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="backdrop" id="backdrop">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-info">
        <div class="modal-fname" id="modalFname"></div>
        <div class="modal-meta" id="modalMeta"></div>
      </div>
      <div class="modal-acts">
        <button class="act-btn" id="copyBtn">Copy</button>
        <button class="act-btn x" id="closeBtn">✕</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="state-box"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script>
// ── Language table ─────────────────────────────────────────────────────────
const LANGS = {
  py:    { label:'Python',     color:'#5a9fd4', bg:'#edf4fb', hljs:'python' },
  c:     { label:'C',          color:'#7a7abf', bg:'#f0f0fa', hljs:'c' },
  cpp:   { label:'C++',        color:'#c9687a', bg:'#fbeeef', hljs:'cpp' },
  cc:    { label:'C++',        color:'#c9687a', bg:'#fbeeef', hljs:'cpp' },
  java:  { label:'Java',       color:'#c48c3a', bg:'#faf3e6', hljs:'java' },
  rs:    { label:'Rust',       color:'#b07458', bg:'#f8ede8', hljs:'rust' },
  js:    { label:'JS',         color:'#c9b030', bg:'#faf7e0', hljs:'javascript' },
  rb:    { label:'Ruby',       color:'#c04040', bg:'#fde8e8', hljs:'ruby' },
  // esoteric
  bf:    { label:'Brainfuck',  color:'#8c7ab5', bg:'#f2eff9', hljs:'brainfuck', esoteric:true },
  b:     { label:'Brainfuck',  color:'#8c7ab5', bg:'#f2eff9', hljs:'brainfuck', esoteric:true },
  ws:    { label:'Whitespace', color:'#7aab8c', bg:'#eaf3ee', hljs:'whitespace', esoteric:true },
  // others
  hs:    { label:'Haskell',    color:'#6a7db5', bg:'#eef0f9', hljs:'haskell' },
  go:    { label:'Go',         color:'#5ab5b5', bg:'#e8f6f6', hljs:'go' },
  sh:    { label:'Shell',      color:'#7ab56a', bg:'#edf7ea', hljs:'bash' },
  pl:    { label:'Perl',       color:'#a06090', bg:'#f5ecf4', hljs:'perl' },
  php:   { label:'PHP',        color:'#7a8abf', bg:'#eef0fa', hljs:'php' },
  kt:    { label:'Kotlin',     color:'#a07ab5', bg:'#f4eef9', hljs:'kotlin' },
  swift: { label:'Swift',      color:'#c97040', bg:'#faeee8', hljs:'swift' },
  cs:    { label:'C#',         color:'#5a8a5a', bg:'#eaf4ea', hljs:'csharp' },
};
const lang = ext => LANGS[ext] || { label: ext.toUpperCase(), color:'#a89b8e', bg:'#f1ede6', hljs: ext };

// ── Parse filename ─────────────────────────────────────────────────────────
// abc001_a.py  →  contest: abc001, problem: a
// abc001-a.py  →  contest: abc001, problem: a
// abc001.py    →  contest: abc001, problem: ''
function parse(filename) {
  const dot = filename.lastIndexOf('.');
  if (dot < 0) return null;
  const base = filename.slice(0, dot);
  const ext  = filename.slice(dot + 1).toLowerCase();
  const sep  = base.search(/[_\-]/);
  const contest = sep >= 0 ? base.slice(0, sep) : base;
  const problem = sep >= 0 ? base.slice(sep + 1) : '';
  return { filename, base, ext, contest, problem, lang: lang(ext), url: `archive/${filename}` };
}

// ── State ──────────────────────────────────────────────────────────────────
let all = [], fLang = 'all', fContest = 'all', query = '', sortKey = 'name';

// ── Boot ───────────────────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch('archive/manifest.json');
    if (!r.ok) throw new Error(`manifest.json が見つかりません (HTTP ${r.status})`);
    const list = await r.json();
    all = list.map(parse).filter(Boolean);
    if (!all.length) throw new Error('manifest.json にファイルが1件もありません。');
  } catch(e) { showError(e.message); return; }
  buildSidebar(); updateStats(); render();
}

function updateStats() {
  document.getElementById('totalCount').textContent   = all.length;
  document.getElementById('contestCount').textContent = new Set(all.map(f=>f.contest)).size;
  document.getElementById('langCount').textContent    = new Set(all.map(f=>f.ext)).size;
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function buildSidebar() {
  const exts = [...new Set(all.map(f=>f.ext))].sort();
  const lf = document.getElementById('langFilters');
  lf.innerHTML = `<button class="filter-btn active" data-lang="all">
    <span class="lang-dot" style="background:var(--muted)"></span>All</button>`;
  exts.forEach(e => {
    const m = lang(e);
    lf.insertAdjacentHTML('beforeend',
      `<button class="filter-btn" data-lang="${e}">
        <span class="lang-dot" style="background:${m.color}"></span>${m.label}</button>`);
  });
  lf.addEventListener('click', e => {
    const b = e.target.closest('[data-lang]'); if(!b) return;
    fLang = b.dataset.lang;
    lf.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); render();
  });

  const contests = [...new Set(all.map(f=>f.contest))].sort();
  const cl = document.getElementById('contestList');
  contests.forEach(c => {
    const cnt = all.filter(f=>f.contest===c).length;
    cl.insertAdjacentHTML('beforeend',
      `<button class="filter-btn" data-contest="${c}">${c}<span class="ccount">${cnt}</span></button>`);
  });
  cl.addEventListener('click', e => {
    const b = e.target.closest('[data-contest]'); if(!b) return;
    fContest = b.dataset.contest;
    cl.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); render();
  });
}

document.getElementById('searchBox').addEventListener('input', e => { query = e.target.value.toLowerCase(); render(); });
document.addEventListener('click', e => {
  const b = e.target.closest('.sort-btn'); if(!b) return;
  sortKey = b.dataset.sort;
  document.querySelectorAll('.sort-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); render();
});

// ── Filter + sort ──────────────────────────────────────────────────────────
function filtered() {
  return all.filter(f => {
    if (fLang    !== 'all' && f.ext     !== fLang)    return false;
    if (fContest !== 'all' && f.contest !== fContest) return false;
    if (query && !f.filename.toLowerCase().includes(query)) return false;
    return true;
  }).sort((a,b) => {
    if (sortKey==='lang')    return a.ext.localeCompare(b.ext)     || a.filename.localeCompare(b.filename);
    if (sortKey==='contest') return a.contest.localeCompare(b.contest) || a.filename.localeCompare(b.filename);
    return a.filename.localeCompare(b.filename);
  });
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const files = filtered();
  const mc = document.getElementById('mainContent');
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('resultInfo').innerHTML =
    `<strong>${files.length}</strong> / ${all.length} files`;

  if (!files.length) {
    mc.className = 'state-box';
    mc.innerHTML = `<span style="font-size:2rem;opacity:.3">🍃</span><span>No results found</span>`;
    return;
  }
  mc.className = 'cards';
  mc.innerHTML = '';
  files.forEach((f, i) => {
    const isWS = f.ext === 'ws';
    const isBF = f.ext === 'bf' || f.ext === 'b';
    const pid  = `p${i}`;
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${Math.min(i*22,160)}ms`;
    card.innerHTML = `
      <div class="card-top">
        <div>
          <div class="card-name">${f.base}</div>
          ${f.problem ? `<div class="card-sub">problem ${f.problem}</div>` : ''}
        </div>
        <span class="lang-chip" style="background:${f.lang.bg};color:${f.lang.color}">${f.lang.label}</span>
      </div>
      <div class="${isWS?'card-preview ws-prev':isBF?'card-preview bf-prev':'card-preview'}" id="${pid}">
        ${isWS ? '⬜ Whitespace — invisible source' : 'Loading…'}
      </div>
      <div class="card-footer">
        <span class="ctag">${f.contest}</span>
        <span style="margin-left:auto;font-size:0.63rem;color:var(--muted)">click to view →</span>
      </div>`;
    card.addEventListener('click', () => openModal(f));
    mc.appendChild(card);
    if (!isWS) {
      fetch(f.url).then(r=>r.text()).then(code => {
        const el = document.getElementById(pid);
        if (el) el.textContent = code.slice(0,280);
      }).catch(() => {
        const el = document.getElementById(pid);
        if (el) el.textContent = '(preview unavailable)';
      });
    }
  });
}

// ── Modal ──────────────────────────────────────────────────────────────────
let _modalCode = '';
async function openModal(f) {
  document.getElementById('modalFname').textContent = f.filename;
  document.getElementById('modalMeta').textContent  =
    `${f.lang.label}  ·  ${f.contest}${f.problem ? '  ·  problem: '+f.problem : ''}`;
  document.getElementById('modalBody').innerHTML =
    `<div class="state-box"><div class="spinner"></div></div>`;
  document.getElementById('backdrop').classList.add('open');

  try {
    _modalCode = await fetch(f.url).then(r=>r.text());
  } catch { document.getElementById('modalBody').innerHTML = `<div class="state-box">⚠ Load failed</div>`; return; }

  if (f.ext === 'ws') {
    renderWS(_modalCode);
  } else if (f.ext === 'bf' || f.ext === 'b') {
    renderBF(_modalCode);
  } else {
    const pre = document.createElement('pre');
    const el  = document.createElement('code');
    el.className = `language-${f.lang.hljs}`;
    el.textContent = _modalCode;
    pre.appendChild(el);
    document.getElementById('modalBody').innerHTML = '';
    document.getElementById('modalBody').appendChild(pre);
    hljs.highlightElement(el);
  }
}

// Brainfuck renderer — color each command
function renderBF(code) {
  const MAP = {'>':'#c96b6b','<':'#6b9bc9','+':'#7ab58c','-':'#b58c7a','.':'#c9aa5a',',':'#a07ab5','[':'#c9b030',']':'#c9b030'};
  const html = [...code].map(ch => {
    if (MAP[ch]) return `<span class="bf-cmd" style="color:${MAP[ch]}">${ch}</span>`;
    if (ch === '\n') return '\n';
    return `<span style="color:var(--muted)">${escHtml(ch)}</span>`;
  }).join('');
  document.getElementById('modalBody').innerHTML = `<div class="bf-view">${html}</div>`;
}

// Whitespace renderer — show S/T/↵ tokens
function renderWS(code) {
  const body = document.getElementById('modalBody');
  const legend = `<div class="ws-legend">
    <span><span class="S">S</span> Space</span>
    <span><span class="T">T</span> Tab</span>
    <span><span class="LF">↵</span> Newline</span>
    <span style="font-size:0.63rem;font-style:italic">(other characters are ignored by the interpreter)</span>
  </div>`;
  const tokens = [...code].map(ch => {
    if (ch === ' ')  return `<span class="S">S</span>`;
    if (ch === '\t') return `<span class="T">T</span>`;
    if (ch === '\n') return `<span class="LF">↵\n</span>`;
    return `<span class="OT">${escHtml(ch)}</span>`;
  }).join('');
  body.innerHTML = `${legend}<div class="ws-view">${tokens}</div>`;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// close / keyboard
document.getElementById('closeBtn').addEventListener('click', () =>
  document.getElementById('backdrop').classList.remove('open'));
document.getElementById('backdrop').addEventListener('click', e => {
  if (e.target === e.currentTarget) document.getElementById('backdrop').classList.remove('open');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('backdrop').classList.remove('open');
});
document.getElementById('copyBtn').addEventListener('click', function() {
  navigator.clipboard.writeText(_modalCode).then(() => {
    this.textContent = 'Copied!';
    setTimeout(() => this.textContent = 'Copy', 1500);
  });
});

function showError(msg) {
  const ec = document.getElementById('errorCard');
  ec.style.display = 'block';
  ec.innerHTML = `⚠ ${msg}<br><br>
    <strong>セットアップ手順</strong><br>
    1. <code>archive/</code> フォルダにコードを入れる（例: <code>abc001-a.py</code>、<code>abc002_b.bf</code>）<br>
    2. マニフェスト生成：<code>python generate_manifest.py</code><br>
    3. サーバー起動：<code>python -m http.server 8000</code>`;
  document.getElementById('mainContent').className = '';
  document.getElementById('mainContent').innerHTML = '';
}

init();
</script>
