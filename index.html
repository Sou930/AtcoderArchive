<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AtCoder Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/one-light.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/c.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/ruby.min.js"></script>
<style>
:root {
  --bg:       #f6f3ee;
  --surface:  #ffffff;
  --panel:    #f0ece4;
  --border:   #e2dbd0;
  --border-s: #cfc7ba;
  --acc:      #c47f5e;
  --acc-s:    #f5ede7;
  --acc2:     #7aab8c;
  --acc2-s:   #e9f4ee;
  --text:     #36302a;
  --text2:    #6a5f54;
  --muted:    #a8998e;
  --sh:       rgba(80,60,40,.07);
  --sh-m:     rgba(80,60,40,.13);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);
  background-size:26px 26px;opacity:.45;pointer-events:none;z-index:0}

/* ─── NAV BAR ─────────────────────────────────────── */
nav{
  position:sticky;top:0;z-index:100;
  background:var(--surface);border-bottom:1.5px solid var(--border);
  box-shadow:0 2px 12px var(--sh);
  display:flex;align-items:center;padding:0 2rem;gap:0;
}
.nav-brand{
  font-size:1.05rem;font-weight:700;color:var(--text);
  display:flex;align-items:center;gap:.5rem;padding:.9rem 0;
  margin-right:1.5rem;cursor:pointer;flex-shrink:0;
}
.nav-brand .dot{width:8px;height:8px;border-radius:50%;background:var(--acc);
  box-shadow:0 0 0 3px var(--acc-s)}
.nav-tabs{display:flex;gap:0;height:100%;flex:1}
.nav-tab{
  background:none;border:none;border-bottom:2.5px solid transparent;
  font-family:'Outfit',sans-serif;font-size:.84rem;font-weight:500;
  color:var(--muted);padding:.85rem 1.1rem;cursor:pointer;
  transition:all .16s;white-space:nowrap;
}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.nav-status{
  margin-left:auto;font-size:.72rem;color:var(--muted);
  display:flex;align-items:center;gap:.5rem;flex-shrink:0;
}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--border)}
.status-dot.ok{background:var(--acc2)}
.status-dot.loading{background:var(--acc);animation:pulse .9s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ─── VIEW SYSTEM ─────────────────────────────────── */
.view{display:none;position:relative;z-index:1}
.view.active{display:block}
.view.fadein{animation:vfade .28s ease}
@keyframes vfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ════════════════════════════════════════════════════
   HOME VIEW
════════════════════════════════════════════════════ */
#homeView{padding:2.5rem 2.5rem 3rem;max-width:1100px;margin:0 auto}

.home-hero{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:20px;padding:2.5rem 2.8rem;
  box-shadow:0 4px 20px var(--sh);
  display:flex;align-items:center;justify-content:space-between;
  gap:2rem;flex-wrap:wrap;margin-bottom:1.8rem;
  background-image:radial-gradient(ellipse at 80% 50%,var(--acc-s) 0%,transparent 65%);
}
.hero-text h2{
  font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;
  letter-spacing:-.03em;color:var(--text);line-height:1.15;
}
.hero-text h2 em{font-style:normal;color:var(--acc)}
.hero-text p{font-size:.88rem;color:var(--text2);margin-top:.5rem;line-height:1.55}
.hero-cta{
  background:var(--acc);color:#fff;border:none;
  font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;
  padding:.7rem 1.6rem;border-radius:100px;cursor:pointer;
  transition:all .16s;white-space:nowrap;
  box-shadow:0 4px 14px rgba(196,127,94,.35);
}
.hero-cta:hover{background:#b36e4d;transform:translateY(-1px);box-shadow:0 6px 20px rgba(196,127,94,.4)}

.hero-stats{
  display:flex;gap:1.2rem;flex-wrap:wrap;flex-shrink:0;
}
.hstat{
  background:var(--panel);border:1.5px solid var(--border);
  border-radius:14px;padding:.9rem 1.3rem;text-align:center;min-width:80px;
}
.hstat-n{font-size:2rem;font-weight:800;color:var(--acc);line-height:1}
.hstat-l{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:.25rem}

/* home grid sections */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.3rem}
@media(max-width:720px){.home-grid{grid-template-columns:1fr}}

.home-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:16px;padding:1.4rem;box-shadow:0 2px 10px var(--sh);
}
.home-card-title{
  font-size:.62rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.12em;color:var(--muted);margin-bottom:1rem;
}

/* language bars */
.lang-bar-row{display:flex;flex-direction:column;gap:.55rem}
.lb-item{display:flex;align-items:center;gap:.7rem;font-size:.8rem}
.lb-name{width:70px;flex-shrink:0;font-weight:500;color:var(--text2)}
.lb-track{flex:1;height:7px;background:var(--panel);border-radius:100px;overflow:hidden}
.lb-fill{height:100%;border-radius:100px;transition:width .6s cubic-bezier(.22,1,.36,1)}
.lb-cnt{flex-shrink:0;font-size:.7rem;color:var(--muted);width:26px;text-align:right}

/* contest list (home) */
.contest-scroll{max-height:220px;overflow-y:auto}
.contest-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:.42rem .5rem;border-radius:8px;cursor:pointer;
  font-size:.82rem;transition:background .14s;
}
.contest-row:hover{background:var(--panel)}
.contest-row-name{font-weight:500;color:var(--text)}
.contest-row-meta{font-size:.7rem;color:var(--muted);display:flex;gap:.5rem;align-items:center}

/* recent list */
.recent-list{display:flex;flex-direction:column;gap:.4rem}
.recent-item{
  display:flex;align-items:center;gap:.65rem;padding:.42rem .5rem;
  border-radius:8px;cursor:pointer;transition:background .14s;
}
.recent-item:hover{background:var(--panel)}
.recent-fname{font-size:.82rem;font-weight:500;color:var(--text);flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-chip{
  flex-shrink:0;font-size:.58rem;font-weight:600;letter-spacing:.04em;
  padding:.13rem .48rem;border-radius:100px;
}

/* ════════════════════════════════════════════════════
   ARCHIVE VIEW
════════════════════════════════════════════════════ */
#archiveView{display:none}
#archiveView.active{
  display:grid;
  grid-template-columns:224px 1fr;
  gap:1.4rem;padding:1.6rem 1.8rem;
  max-width:1280px;margin:0 auto;
  align-items:start;
}

/* SIDEBAR */
aside{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:16px;padding:1.2rem;box-shadow:0 2px 10px var(--sh);
  position:sticky;top:calc(44px + 1.4rem);
  max-height:calc(100vh - 44px - 3rem);overflow-y:auto;
}
.sec{margin-bottom:1.1rem}
.sec:last-child{margin-bottom:0}
.sec-lbl{
  font-size:.6rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.13em;color:var(--muted);margin-bottom:.5rem;padding-left:.25rem;
}
.search-wrap{position:relative}
.search-wrap::before{
  content:'⌕';position:absolute;left:.7rem;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:1rem;pointer-events:none;
}
.sbox{
  width:100%;background:var(--panel);border:1.5px solid var(--border);color:var(--text);
  font-family:'Outfit',sans-serif;font-size:.8rem;
  padding:.46rem .7rem .46rem 2rem;border-radius:10px;outline:none;
  transition:border-color .18s,box-shadow .18s;
}
.sbox:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-s)}
.sbox::placeholder{color:var(--muted)}
.fg{display:flex;flex-direction:column;gap:.18rem}
.fb{
  background:none;border:1.5px solid transparent;color:var(--text2);
  font-family:'Outfit',sans-serif;font-size:.79rem;padding:.34rem .6rem;
  text-align:left;border-radius:9px;cursor:pointer;
  display:flex;align-items:center;gap:.5rem;transition:all .14s;
  white-space:nowrap;overflow:hidden;
}
.fb:hover{background:var(--panel);color:var(--text)}
.fb.on{background:var(--acc-s);border-color:rgba(196,127,94,.38);color:var(--acc);font-weight:500}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cc{margin-left:auto;font-size:.6rem;background:var(--panel);
  border:1px solid var(--border);border-radius:100px;padding:.04rem .38rem;color:var(--muted)}

/* SORT BAR */
.sort-bar{display:flex;align-items:center;gap:.7rem;margin-bottom:1rem;flex-wrap:wrap}
.rinfo{font-size:.75rem;color:var(--muted)}
.rinfo strong{color:var(--text);font-weight:600}
.sort-group{
  margin-left:auto;display:flex;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:10px;overflow:hidden;
}
.sb{
  background:none;border:none;border-right:1px solid var(--border);
  color:var(--muted);font-family:'Outfit',sans-serif;font-size:.72rem;font-weight:500;
  padding:.34rem .78rem;cursor:pointer;transition:all .14s;white-space:nowrap;
}
.sb:last-child{border-right:none}
.sb:hover{background:var(--panel);color:var(--text)}
.sb.on{background:var(--acc);color:#fff}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:.9rem}
.card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:14px;overflow:hidden;cursor:pointer;
  transition:border-color .18s,transform .16s,box-shadow .18s;
  animation:rise .3s ease both;
}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card:hover{border-color:var(--acc);transform:translateY(-3px);box-shadow:0 8px 28px var(--sh-m)}
.card-top{padding:.82rem .95rem .6rem;display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
.card-name{font-size:.84rem;font-weight:600;color:var(--text);word-break:break-all;line-height:1.3}
.card-sub{font-size:.67rem;color:var(--muted);margin-top:.1rem}
.chip{flex-shrink:0;font-size:.59rem;font-weight:600;letter-spacing:.04em;padding:.15rem .5rem;border-radius:100px}
.card-prev{
  margin:0 .7rem;background:var(--panel);border-radius:8px;
  padding:.52rem .68rem;font-family:'JetBrains Mono',monospace;
  font-size:.63rem;line-height:1.5;color:var(--text2);
  max-height:64px;overflow:hidden;white-space:pre;
  mask-image:linear-gradient(180deg,#000 35%,transparent);
}
.ws-prev{
  display:flex;align-items:center;justify-content:center;
  height:54px;color:var(--muted);font-family:'Outfit',sans-serif;
  font-size:.7rem;font-style:italic;white-space:normal;
  mask-image:none;border:1.5px dashed var(--border);
}
.bf-prev{color:#8c7ab5}
.card-foot{
  padding:.52rem .95rem .68rem;
  display:flex;align-items:center;gap:.4rem;font-size:.65rem;color:var(--muted);
}
.ctag{
  background:var(--panel);border:1px solid var(--border);border-radius:100px;
  padding:.08rem .44rem;font-size:.62rem;font-weight:500;color:var(--text2);
}
.path-tag{font-size:.6rem;color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}

/* ─── MODAL ─────────────────────────────────────── */
.backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(50,38,28,.42);backdrop-filter:blur(6px);
  z-index:200;align-items:center;justify-content:center;padding:1.5rem;
}
.backdrop.open{display:flex}
.modal{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:18px;width:100%;max-width:840px;max-height:90vh;
  display:flex;flex-direction:column;
  box-shadow:0 24px 80px rgba(60,45,35,.22);
  animation:popIn .22s cubic-bezier(.34,1.56,.64,1);overflow:hidden;
}
@keyframes popIn{from{opacity:0;transform:scale(.94) translateY(8px)}to{opacity:1;transform:none}}
.modal-head{
  padding:.95rem 1.25rem;border-bottom:1.5px solid var(--border);
  display:flex;align-items:center;gap:.7rem;flex-shrink:0;background:var(--panel);
}
.minfo{flex:1;min-width:0}
.mfname{font-size:.92rem;font-weight:600;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mmeta{font-size:.67rem;color:var(--muted);margin-top:.08rem}
.macts{display:flex;gap:.45rem;flex-shrink:0}
.abt{
  background:var(--surface);border:1.5px solid var(--border);color:var(--text2);
  font-family:'Outfit',sans-serif;font-size:.73rem;font-weight:500;
  padding:.34rem .82rem;border-radius:9px;cursor:pointer;transition:all .14s;
}
.abt:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-s)}
.abt.x:hover{border-color:#c96b6b;color:#c96b6b;background:#fdf0f0}
.modal-body{overflow-y:auto;flex:1;background:#faf9f7}
.modal-body pre{margin:0;border-radius:0;background:#faf9f7!important}
.modal-body code.hljs{
  font-family:'JetBrains Mono',monospace!important;
  font-size:.79rem!important;line-height:1.8!important;
  padding:1.3rem 1.5rem!important;background:#faf9f7!important;
}
.bf-view{
  font-family:'JetBrains Mono',monospace;font-size:.79rem;
  line-height:1.9;padding:1.3rem 1.5rem;white-space:pre-wrap;
  word-break:break-all;background:#faf9f7;
}
.ws-legend{
  display:flex;gap:1rem;padding:.55rem 1.4rem;
  border-bottom:1px solid var(--border);background:var(--panel);
  font-size:.68rem;color:var(--muted);flex-wrap:wrap;align-items:center;
}
.ws-legend span{display:flex;align-items:center;gap:.3rem}
.ws-view{
  font-family:'JetBrains Mono',monospace;font-size:.77rem;
  line-height:2.05;padding:1.3rem 1.5rem;background:#faf9f7;
}
.S{background:#dff0e8;border-radius:3px;padding:1px 4px;color:#7aab8c}
.T{background:#e8eef7;border-radius:3px;padding:1px 4px;color:#7a9dbf}
.LF{color:var(--muted)}
.OT{color:#d4ccc0;text-decoration:line-through}

/* ─── STATES ─────────────────────────────────────── */
.sbox-s{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:5rem 2rem;gap:1rem;
  color:var(--muted);font-size:.82rem;text-align:center;
}
.spin{
  width:26px;height:26px;border:2.5px solid var(--border);
  border-top-color:var(--acc);border-radius:50%;
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.err-card{
  background:#fff8f7;border:1.5px solid #f0d0c4;border-radius:14px;
  padding:1.3rem 1.5rem;font-size:.79rem;color:#a0503a;
  line-height:1.85;display:none;margin-bottom:1rem;
}
.err-card code{
  font-family:'JetBrains Mono',monospace;background:var(--panel);
  border-radius:6px;padding:.5rem .8rem;display:block;
  margin:.3rem 0;color:var(--text);font-size:.73rem;
}
@media(max-width:720px){
  #archiveView.active{grid-template-columns:1fr;padding:1rem}
  aside{position:static;max-height:none}
  #homeView{padding:1.2rem}
  nav{padding:0 1rem}
}
</style>
</head>
<body>

<!-- ─── NAV ──────────────────────────────────────── -->
<nav id="appNav">
  <div class="nav-brand" onclick="showView('home')">
    <span class="dot"></span> AtCoder Archive
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-view="home">🏠 Home</button>
    <button class="nav-tab" data-view="archive">📁 Archive</button>
  </div>
  <div class="nav-status">
    <span class="status-dot loading" id="statusDot"></span>
    <span id="statusText">Loading…</span>
  </div>
</nav>

<!-- ═══════════════ HOME VIEW ═══════════════════════ -->
<div class="view active fadein" id="homeView">
  <div class="home-hero">
    <div class="hero-text">
      <h2>My AtCoder<br><em>Solutions</em></h2>
      <p>競プロで解いたコードのアーカイブ</p>
      <button class="hero-cta" style="margin-top:1.1rem" onclick="showView('archive')">
        Browse Archive →
      </button>
    </div>
    <div class="hero-stats">
      <div class="hstat"><div class="hstat-n" id="hTotal">—</div><div class="hstat-l">Solutions</div></div>
      <div class="hstat"><div class="hstat-n" id="hContests">—</div><div class="hstat-l">Contests</div></div>
      <div class="hstat"><div class="hstat-n" id="hLangs">—</div><div class="hstat-l">Languages</div></div>
    </div>
  </div>

  <div class="home-grid">
    <!-- Language breakdown -->
    <div class="home-card">
      <div class="home-card-title">Language Breakdown</div>
      <div class="lang-bar-row" id="langBars">
        <div class="sbox-s" style="padding:1.5rem"><div class="spin"></div></div>
      </div>
    </div>

    <!-- Recent solutions -->
    <div class="home-card">
      <div class="home-card-title">Recent Solutions</div>
      <div class="recent-list" id="recentList">
        <div class="sbox-s" style="padding:1.5rem"><div class="spin"></div></div>
      </div>
    </div>

    <!-- Contest list -->
    <div class="home-card" style="grid-column:1/-1">
      <div class="home-card-title">Contests</div>
      <div class="contest-scroll">
        <div class="contest-rows" id="contestRows">
          <div class="sbox-s" style="padding:1.5rem"><div class="spin"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════ ARCHIVE VIEW ════════════════════ -->
<div class="view" id="archiveView">
  <!-- sidebar -->
  <aside>
    <div class="sec">
      <div class="sec-lbl">Search</div>
      <div class="search-wrap">
        <input class="sbox" id="searchBox" type="text" placeholder="abc001, a, brainfuck…">
      </div>
    </div>
    <div class="sec">
      <div class="sec-lbl">Language</div>
      <div class="fg" id="langFilters">
        <button class="fb on" data-lang="all"><span class="ldot" style="background:var(--muted)"></span>All</button>
      </div>
    </div>
    <div class="sec">
      <div class="sec-lbl">Contest</div>
      <div class="fg" id="contestFilters"></div>
    </div>
  </aside>

  <!-- main area -->
  <main>
    <div class="err-card" id="errCard"></div>
    <div class="sort-bar" id="sortBar" style="display:none">
      <span class="rinfo" id="rinfo"></span>
      <div class="sort-group">
        <button class="sb on"  data-sort="contest-asc" title="コンテスト古い順">Contest ↑</button>
        <button class="sb"     data-sort="contest-desc" title="コンテスト新しい順">Contest ↓</button>
        <button class="sb"     data-sort="name-asc"    title="ファイル名順">Name</button>
        <button class="sb"     data-sort="lang"        title="言語順">Lang</button>
      </div>
    </div>
    <div id="cardsWrap" class="sbox-s">
      <div class="spin"></div><span>Scanning archive…</span>
    </div>
  </main>
</div>

<!-- ─── MODAL ───────────────────────────────────── -->
<div class="backdrop" id="backdrop">
  <div class="modal">
    <div class="modal-head">
      <div class="minfo">
        <div class="mfname" id="mFname"></div>
        <div class="mmeta"  id="mMeta"></div>
      </div>
      <div class="macts">
        <button class="abt" id="copyBtn">Copy</button>
        <button class="abt x" id="closeBtn">✕</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="sbox-s"><div class="spin"></div></div>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════
   LANG META
════════════════════════════════════════════════════ */
const LANGS={
  py:   {label:'Python',    color:'#5a9fd4',bg:'#edf4fb',hljs:'python'},
  c:    {label:'C',         color:'#7a7abf',bg:'#f0f0fa',hljs:'c'},
  cpp:  {label:'C++',       color:'#c9687a',bg:'#fbeeef',hljs:'cpp'},
  cc:   {label:'C++',       color:'#c9687a',bg:'#fbeeef',hljs:'cpp'},
  java: {label:'Java',      color:'#c48c3a',bg:'#faf3e6',hljs:'java'},
  rs:   {label:'Rust',      color:'#b07458',bg:'#f8ede8',hljs:'rust'},
  js:   {label:'JS',        color:'#c9b030',bg:'#faf7e0',hljs:'javascript'},
  rb:   {label:'Ruby',      color:'#c04040',bg:'#fde8e8',hljs:'ruby'},
  bf:   {label:'Brainfuck', color:'#8c7ab5',bg:'#f2eff9',hljs:'brainfuck',esoteric:true},
  b:    {label:'Brainfuck', color:'#8c7ab5',bg:'#f2eff9',hljs:'brainfuck',esoteric:true},
  ws:   {label:'Whitespace',color:'#7aab8c',bg:'#eaf3ee',hljs:'whitespace',esoteric:true},
  hs:   {label:'Haskell',   color:'#6a7db5',bg:'#eef0f9',hljs:'haskell'},
  go:   {label:'Go',        color:'#5ab5b5',bg:'#e8f6f6',hljs:'go'},
  sh:   {label:'Shell',     color:'#7ab56a',bg:'#edf7ea',hljs:'bash'},
  pl:   {label:'Perl',      color:'#a06090',bg:'#f5ecf4',hljs:'perl'},
  php:  {label:'PHP',       color:'#7a8abf',bg:'#eef0fa',hljs:'php'},
  kt:   {label:'Kotlin',    color:'#a07ab5',bg:'#f4eef9',hljs:'kotlin'},
  swift:{label:'Swift',     color:'#c97040',bg:'#faeee8',hljs:'swift'},
  cs:   {label:'C#',        color:'#5a8a5a',bg:'#eaf4ea',hljs:'csharp'},
};
const SRC_EXTS=new Set(Object.keys(LANGS));
const getLang=e=>LANGS[e]||{label:e.toUpperCase(),color:'#a8998e',bg:'#f0ece4',hljs:e};

/* ════════════════════════════════════════════════════
   DIRECTORY SCANNER  (Python http.server の HTML一覧をパース)
════════════════════════════════════════════════════ */
async function scanDir(url){
  const r=await fetch(url);
  if(!r.ok) throw new Error(`HTTP ${r.status}: ${url}`);
  const html=await r.text();
  const doc=new DOMParser().parseFromString(html,'text/html');
  const hrefs=[...doc.querySelectorAll('a[href]')]
    .map(a=>a.getAttribute('href'))
    .filter(h=>h&&!h.startsWith('?')&&!h.startsWith('/')&&h!=='../');
  const files=[];
  for(const h of hrefs){
    const abs=url.endsWith('/')?url+h:url+'/'+h;
    if(h.endsWith('/')){
      try{ files.push(...await scanDir(abs)) }catch(_){}
    } else {
      const ext=h.split('.').pop().toLowerCase();
      if(SRC_EXTS.has(ext)) files.push(abs);
    }
  }
  return files;
}

/* ════════════════════════════════════════════════════
   PARSE FILE URL
   archive/py/abc001-a.py  →  {contest,problem,lang,…}
════════════════════════════════════════════════════ */
function parseURL(fullUrl){
  // relative path from archive/
  const archIdx=fullUrl.indexOf('archive/');
  const rel=archIdx>=0?fullUrl.slice(archIdx+8):fullUrl.split('/').pop();
  const filename=rel.split('/').pop();           // abc001-a.py
  const dot=filename.lastIndexOf('.');
  if(dot<0) return null;
  const base=filename.slice(0,dot);
  const ext=filename.slice(dot+1).toLowerCase();
  if(!SRC_EXTS.has(ext)) return null;
  // contest = part before first _ or -
  const sep=base.search(/[_\-]/);
  const contest=sep>=0?base.slice(0,sep):base;
  const problem=sep>=0?base.slice(sep+1):'';
  // folder path (everything before last /)
  const parts=rel.split('/');
  const folder=parts.length>1?parts.slice(0,-1).join('/'):'';
  return{fullUrl,rel,filename,base,ext,contest,problem,folder,lang:getLang(ext)};
}

/* contest → sort key (numeric suffix extraction)
   abc001 → [0,1]   arc001 → [1,1]   agc001 → [2,1]  other → [99,str] */
function contestKey(c){
  const m=c.match(/^(abc|arc|agc|ahc|apc|abl)0*(\d+)$/i);
  if(!m) return [99,c];
  const prefix={'abc':0,'arc':1,'agc':2,'ahc':3,'apc':4,'abl':5}[m[1].toLowerCase()]??6;
  return[prefix,parseInt(m[2],10)];
}
function cmpContest(a,b){
  const ka=contestKey(a),kb=contestKey(b);
  return ka[0]-kb[0]||ka[1]-kb[1]||a.localeCompare(b);
}

/* ════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════ */
let all=[];
let fLang='all', fContest='all', query='', sortKey='contest-asc';

/* ════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════ */
async function init(){
  setStatus('loading','Scanning…');
  try{
    const urls=await scanDir('archive/');
    all=urls.map(parseURL).filter(Boolean);
    if(!all.length) throw new Error('archive/ にソースコードが見つかりませんでした。');
  }catch(e){
    setStatus('err','Error');
    showErr(e.message); return;
  }
  setStatus('ok',`${all.length} files`);
  buildHome();
  buildSidebar();
  renderCards();
}

function setStatus(state,txt){
  const d=document.getElementById('statusDot');
  const t=document.getElementById('statusText');
  d.className='status-dot'+(state==='ok'?' ok':state==='loading'?' loading':'');
  t.textContent=txt;
}

/* ════════════════════════════════════════════════════
   VIEW ROUTER
════════════════════════════════════════════════════ */
function showView(name){
  document.querySelectorAll('.view,.nav-tab').forEach(el=>{
    const isTarget=el.dataset.view===name||el.id===(name+'View');
    el.classList.toggle('active',isTarget);
    if(el.classList.contains('fadein')&&!isTarget) el.classList.remove('fadein');
  });
  if(name==='archive'){
    const av=document.getElementById('archiveView');
    av.style.display='grid';
    av.classList.add('active','fadein');
    setTimeout(()=>av.classList.remove('fadein'),400);
  }
}
document.querySelectorAll('.nav-tab').forEach(b=>
  b.addEventListener('click',()=>showView(b.dataset.view)));

/* ════════════════════════════════════════════════════
   HOME
════════════════════════════════════════════════════ */
function buildHome(){
  document.getElementById('hTotal').textContent   =all.length;
  document.getElementById('hContests').textContent=new Set(all.map(f=>f.contest)).size;
  document.getElementById('hLangs').textContent   =new Set(all.map(f=>f.ext)).size;

  // Language bars
  const byCnt={};
  all.forEach(f=>{byCnt[f.ext]=(byCnt[f.ext]||0)+1});
  const sorted=Object.entries(byCnt).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const max=sorted[0]?.[1]||1;
  document.getElementById('langBars').innerHTML=sorted.map(([ext,cnt])=>{
    const m=getLang(ext);
    return`<div class="lb-item">
      <span class="lb-name">${m.label}</span>
      <div class="lb-track"><div class="lb-fill" style="width:${(cnt/max*100).toFixed(1)}%;background:${m.color}"></div></div>
      <span class="lb-cnt">${cnt}</span>
    </div>`;
  }).join('');

  // Recent (last 8 by contest desc then filename)
  const recent=[...all].sort((a,b)=>cmpContest(b.contest,a.contest)||b.filename.localeCompare(a.filename)).slice(0,8);
  document.getElementById('recentList').innerHTML=recent.map(f=>`
    <div class="recent-item" onclick="openFileFromHome('${CSS.escape(f.fullUrl)}')">
      <span class="recent-fname">${f.filename}</span>
      <span class="recent-chip" style="background:${f.lang.bg};color:${f.lang.color}">${f.lang.label}</span>
    </div>`).join('');

  // Contest table
  const byContest={};
  all.forEach(f=>{
    if(!byContest[f.contest]) byContest[f.contest]={files:[],exts:new Set()};
    byContest[f.contest].files.push(f);
    byContest[f.contest].exts.add(f.ext);
  });
  const contestsSorted=Object.entries(byContest).sort((a,b)=>cmpContest(a[0],b[0]));
  document.getElementById('contestRows').innerHTML=contestsSorted.map(([c,{files,exts}])=>{
    const chips=[...exts].map(e=>{
      const m=getLang(e);
      return`<span style="background:${m.bg};color:${m.color};font-size:.58rem;font-weight:600;padding:.1rem .4rem;border-radius:100px">${m.label}</span>`;
    }).join('');
    return`<div class="contest-row" onclick="filterToContest('${c}')">
      <span class="contest-row-name">${c}</span>
      <span class="contest-row-meta">${chips}<span>${files.length} files</span></span>
    </div>`;
  }).join('');
}

function openFileFromHome(url){
  const f=all.find(x=>x.fullUrl===url)||all.find(x=>CSS.escape(x.fullUrl)===url);
  if(f) openModal(f);
}
function filterToContest(c){
  fContest=c;
  document.querySelectorAll('#contestFilters .fb').forEach(b=>{
    b.classList.toggle('on',b.dataset.contest===c);
  });
  renderCards();
  showView('archive');
}

/* ════════════════════════════════════════════════════
   ARCHIVE SIDEBAR
════════════════════════════════════════════════════ */
function buildSidebar(){
  // Lang
  const exts=[...new Set(all.map(f=>f.ext))].sort();
  const lf=document.getElementById('langFilters');
  lf.innerHTML=`<button class="fb on" data-lang="all"><span class="ldot" style="background:var(--muted)"></span>All</button>`;
  exts.forEach(e=>{
    const m=getLang(e);
    lf.insertAdjacentHTML('beforeend',
      `<button class="fb" data-lang="${e}"><span class="ldot" style="background:${m.color}"></span>${m.label}</button>`);
  });
  lf.addEventListener('click',e=>{
    const b=e.target.closest('[data-lang]');if(!b)return;
    fLang=b.dataset.lang;
    lf.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');renderCards();
  });

  // Contest
  const contests=[...new Set(all.map(f=>f.contest))].sort((a,b)=>cmpContest(a,b));
  const cf=document.getElementById('contestFilters');
  cf.innerHTML=`<button class="fb on" data-contest="all">All</button>`;
  contests.forEach(c=>{
    const cnt=all.filter(f=>f.contest===c).length;
    cf.insertAdjacentHTML('beforeend',
      `<button class="fb" data-contest="${c}">${c}<span class="cc">${cnt}</span></button>`);
  });
  cf.addEventListener('click',e=>{
    const b=e.target.closest('[data-contest]');if(!b)return;
    fContest=b.dataset.contest;
    cf.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');renderCards();
  });
}

/* ════════════════════════════════════════════════════
   SEARCH / SORT
════════════════════════════════════════════════════ */
document.getElementById('searchBox').addEventListener('input',e=>{query=e.target.value.toLowerCase();renderCards()});
document.addEventListener('click',e=>{
  const b=e.target.closest('.sb');if(!b)return;
  sortKey=b.dataset.sort;
  document.querySelectorAll('.sb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');renderCards();
});

function filtered(){
  return all.filter(f=>{
    if(fLang!=='all'&&f.ext!==fLang)return false;
    if(fContest!=='all'&&f.contest!==fContest)return false;
    if(query&&!f.filename.toLowerCase().includes(query)&&!f.rel.toLowerCase().includes(query))return false;
    return true;
  }).sort((a,b)=>{
    switch(sortKey){
      case'contest-asc':  return cmpContest(a.contest,b.contest)||a.filename.localeCompare(b.filename);
      case'contest-desc': return cmpContest(b.contest,a.contest)||a.filename.localeCompare(b.filename);
      case'lang':         return a.ext.localeCompare(b.ext)||a.filename.localeCompare(b.filename);
      default:            return a.filename.localeCompare(b.filename);
    }
  });
}

/* ════════════════════════════════════════════════════
   RENDER CARDS
════════════════════════════════════════════════════ */
function renderCards(){
  const files=filtered();
  const cw=document.getElementById('cardsWrap');
  document.getElementById('sortBar').style.display='flex';
  document.getElementById('rinfo').innerHTML=`<strong>${files.length}</strong> / ${all.length} files`;

  if(!files.length){
    cw.className='sbox-s';
    cw.innerHTML=`<span style="font-size:2rem;opacity:.3">🍃</span><span>No results</span>`;return;
  }
  cw.className='cards';cw.innerHTML='';
  files.forEach((f,i)=>{
    const isWS=f.ext==='ws',isBF=f.ext==='bf'||f.ext==='b';
    const pid=`p${i}`;
    const card=document.createElement('div');
    card.className='card';card.style.animationDelay=`${Math.min(i*18,150)}ms`;
    card.innerHTML=`
      <div class="card-top">
        <div>
          <div class="card-name">${f.base}</div>
          ${f.problem?`<div class="card-sub">problem ${f.problem}</div>`:''}
        </div>
        <span class="chip" style="background:${f.lang.bg};color:${f.lang.color}">${f.lang.label}</span>
      </div>
      <div class="${isWS?'card-prev ws-prev':isBF?'card-prev bf-prev':'card-prev'}" id="${pid}">
        ${isWS?'⬜ Whitespace — invisible source':'Loading…'}
      </div>
      <div class="card-foot">
        <span class="ctag">${f.contest}</span>
        ${f.folder?`<span class="path-tag">📂 ${f.folder}</span>`:''}
        <span style="margin-left:auto;font-size:.62rem;color:var(--muted)">→</span>
      </div>`;
    card.addEventListener('click',()=>openModal(f));
    cw.appendChild(card);
    if(!isWS){
      fetch(f.fullUrl).then(r=>r.text()).then(code=>{
        const el=document.getElementById(pid);
        if(el)el.textContent=code.slice(0,260);
      }).catch(()=>{const el=document.getElementById(pid);if(el)el.textContent='(preview unavailable)'});
    }
  });
}

/* ════════════════════════════════════════════════════
   MODAL
════════════════════════════════════════════════════ */
let _code='';
async function openModal(f){
  document.getElementById('mFname').textContent=f.filename;
  document.getElementById('mMeta').textContent=
    `${f.lang.label}  ·  ${f.contest}${f.problem?' · problem '+f.problem:''}${f.folder?' · '+f.folder:''}`;
  document.getElementById('modalBody').innerHTML=`<div class="sbox-s"><div class="spin"></div></div>`;
  document.getElementById('backdrop').classList.add('open');
  try{_code=await fetch(f.fullUrl).then(r=>r.text())}
  catch{document.getElementById('modalBody').innerHTML=`<div class="sbox-s">⚠ Load failed</div>`;return}
  if(f.ext==='ws') renderWS(_code);
  else if(f.ext==='bf'||f.ext==='b') renderBF(_code);
  else{
    const pre=document.createElement('pre');
    const el=document.createElement('code');
    el.className=`language-${f.lang.hljs}`;el.textContent=_code;
    pre.appendChild(el);
    document.getElementById('modalBody').innerHTML='';
    document.getElementById('modalBody').appendChild(pre);
    hljs.highlightElement(el);
  }
}
function renderBF(code){
  const C={'>':'#c96b6b','<':'#6b9bc9','+':'#7ab58c','-':'#b58c7a','.':'#c9aa5a',',':'#a07ab5','[':'#c9b030',']':'#c9b030'};
  const h=[...code].map(ch=>{
    if(C[ch])return`<span style="color:${C[ch]};font-weight:600">${ch}</span>`;
    if(ch==='\n')return'\n';
    return`<span style="color:var(--muted)">${esc(ch)}</span>`;
  }).join('');
  document.getElementById('modalBody').innerHTML=`<div class="bf-view">${h}</div>`;
}
function renderWS(code){
  const leg=`<div class="ws-legend">
    <span><span class="S">S</span>Space</span>
    <span><span class="T">T</span>Tab</span>
    <span><span class="LF">↵</span>Newline</span>
    <span style="font-size:.6rem;font-style:italic">（他の文字はWhitespace処理系では無視されます）</span>
  </div>`;
  const tok=[...code].map(ch=>{
    if(ch===' ')return`<span class="S">S</span>`;
    if(ch==='\t')return`<span class="T">T</span>`;
    if(ch==='\n')return`<span class="LF">↵\n</span>`;
    return`<span class="OT">${esc(ch)}</span>`;
  }).join('');
  document.getElementById('modalBody').innerHTML=`${leg}<div class="ws-view">${tok}</div>`;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

document.getElementById('closeBtn').addEventListener('click',()=>document.getElementById('backdrop').classList.remove('open'));
document.getElementById('backdrop').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('backdrop').classList.remove('open')});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('backdrop').classList.remove('open')});
document.getElementById('copyBtn').addEventListener('click',function(){
  navigator.clipboard.writeText(_code).then(()=>{this.textContent='Copied!';setTimeout(()=>this.textContent='Copy',1500)});
});

/* ════════════════════════════════════════════════════
   ERROR
════════════════════════════════════════════════════ */
function showErr(msg){
  const ec=document.getElementById('errCard');
  ec.style.display='block';
  ec.innerHTML=`⚠ ${msg}<br><br>
    <strong>起動方法</strong><br>
    archive/ フォルダにコードを入れ、以下でサーバーを起動してください：
    <code>python -m http.server 8000</code>
    ブラウザで <code>http://localhost:8000</code> を開いてください。<br><br>
    <strong>対応フォルダ構造（例）</strong>
    <code>archive/abc001-a.py<br>archive/py/abc002-b.py<br>archive/cpp/abc003-c.cpp</code>`;
  document.getElementById('cardsWrap').className='';
  document.getElementById('cardsWrap').innerHTML='';
  showView('archive');
}

init();
</script>
