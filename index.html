<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AtCoder Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link id="hljsTheme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/one-light.min.css">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AtCoder Archive">
<meta name="theme-color" id="themeColorMeta" content="#c47f5e">
<link rel="manifest" id="pwaManifest">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/c.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/ruby.min.js"></script>
<style>
/* ─── THEME ──────────────────────────────────────── */
:root{
  --bg:#f6f3ee;--surface:#ffffff;--panel:#f0ece4;
  --border:#e2dbd0;--border-s:#cfc7ba;
  --acc:#c47f5e;--acc-s:#f5ede7;
  --acc2:#7aab8c;--acc2-s:#e9f4ee;
  --text:#36302a;--text2:#6a5f54;--muted:#a8998e;
  --sh:rgba(80,60,40,.07);--sh-m:rgba(80,60,40,.13);
  --modal-bg:#faf9f7;
}
[data-theme="dark"]{
  --bg:#1c1917;--surface:#242220;--panel:#2c2926;
  --border:#3d3830;--border-s:#504840;
  --acc:#d4956e;--acc-s:#2d1f16;
  --acc2:#7aab8c;--acc2-s:#162218;
  --text:#e8e0d8;--text2:#a89880;--muted:#6a5f54;
  --sh:rgba(0,0,0,.4);--sh-m:rgba(0,0,0,.6);
  --modal-bg:#1e1c1a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .2s,color .2s}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:26px 26px;opacity:.45;pointer-events:none;z-index:0}

/* ─── NAV ────────────────────────────────────────── */
nav{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1.5px solid var(--border);box-shadow:0 2px 12px var(--sh);display:flex;align-items:center;padding:0 1rem;gap:0}
.nav-brand{font-size:1.05rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:.5rem;padding:.9rem 0;margin-right:1rem;cursor:pointer;flex-shrink:0}
.nav-brand .dot{width:8px;height:8px;border-radius:50%;background:var(--acc);box-shadow:0 0 0 3px var(--acc-s)}
.nav-tabs{display:flex;gap:0;height:100%;flex:1;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{background:none;border:none;border-bottom:2.5px solid transparent;font-family:'Outfit',sans-serif;font-size:.84rem;font-weight:500;color:var(--muted);padding:.85rem 1rem;cursor:pointer;transition:all .16s;white-space:nowrap}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.nav-status{font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:.4rem}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--border)}
.status-dot.ok{background:var(--acc2)}
.status-dot.loading{background:var(--acc);animation:pulse .9s ease infinite}
.status-dot.err{background:#c96b6b}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.icon-btn{background:none;border:1.5px solid var(--border);border-radius:9px;color:var(--text2);font-size:.82rem;padding:.28rem .55rem;cursor:pointer;transition:all .14s;line-height:1}
.icon-btn:hover{background:var(--panel);color:var(--text)}
.menu-btn{display:none}
@media(max-width:720px){.menu-btn{display:flex}}

/* ─── VIEWS ──────────────────────────────────────── */
.view{display:none;position:relative;z-index:1}
.view.active{display:block}
.view.fadein{animation:vfade .28s ease}
@keyframes vfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ════════ HOME ════════════════════════════════════ */
#homeView{padding:2.5rem 2.5rem 3rem;max-width:1100px;margin:0 auto}
@media(max-width:720px){#homeView{padding:1.2rem}}
.home-hero{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:2.5rem 2.8rem;box-shadow:0 4px 20px var(--sh);display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;margin-bottom:1.8rem;background-image:radial-gradient(ellipse at 80% 50%,var(--acc-s) 0%,transparent 65%)}
.hero-text h2{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;letter-spacing:-.03em;color:var(--text);line-height:1.15}
.hero-text h2 em{font-style:normal;color:var(--acc)}
.hero-text p{font-size:.88rem;color:var(--text2);margin-top:.5rem;line-height:1.55}
.hero-cta{background:var(--acc);color:#fff;border:none;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;padding:.7rem 1.6rem;border-radius:100px;cursor:pointer;transition:all .16s;white-space:nowrap;box-shadow:0 4px 14px rgba(196,127,94,.35)}
.hero-cta:hover{background:#b36e4d;transform:translateY(-1px)}
.hero-stats{display:flex;gap:1.2rem;flex-wrap:wrap;flex-shrink:0}
.hstat{background:var(--panel);border:1.5px solid var(--border);border-radius:14px;padding:.9rem 1.3rem;text-align:center;min-width:80px}
.hstat-n{font-size:2rem;font-weight:800;color:var(--acc);line-height:1}
.hstat-l{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:.25rem}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.3rem}
@media(max-width:720px){.home-grid{grid-template-columns:1fr}}
.home-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:1.4rem;box-shadow:0 2px 10px var(--sh)}
.home-card-title{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:1rem}
.lang-bar-row{display:flex;flex-direction:column;gap:.55rem}
.lb-item{display:flex;align-items:center;gap:.7rem;font-size:.8rem}
.lb-name{width:70px;flex-shrink:0;font-weight:500;color:var(--text2)}
.lb-track{flex:1;height:7px;background:var(--panel);border-radius:100px;overflow:hidden}
.lb-fill{height:100%;border-radius:100px;transition:width .6s cubic-bezier(.22,1,.36,1)}
.lb-cnt{flex-shrink:0;font-size:.7rem;color:var(--muted);width:26px;text-align:right}
.contest-scroll{max-height:220px;overflow-y:auto}
.contest-row{display:flex;align-items:center;justify-content:space-between;padding:.42rem .5rem;border-radius:8px;cursor:pointer;font-size:.82rem;transition:background .14s}
.contest-row:hover{background:var(--panel)}
.contest-row-name{font-weight:500;color:var(--text)}
.contest-row-meta{font-size:.7rem;color:var(--muted);display:flex;gap:.5rem;align-items:center}
.recent-list{display:flex;flex-direction:column;gap:.4rem}
.recent-item{display:flex;align-items:center;gap:.65rem;padding:.42rem .5rem;border-radius:8px;cursor:pointer;transition:background .14s}
.recent-item:hover{background:var(--panel)}
.recent-fname{font-size:.82rem;font-weight:500;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-chip{flex-shrink:0;font-size:.58rem;font-weight:600;letter-spacing:.04em;padding:.13rem .48rem;border-radius:100px}

/* ════════ ARCHIVE ══════════════════════════════════ */
#archiveView{display:none}
#archiveView.active{display:grid;grid-template-columns:224px 1fr;gap:1.4rem;padding:1.6rem 1.8rem;max-width:1280px;margin:0 auto;align-items:start}
@media(max-width:720px){#archiveView.active{grid-template-columns:1fr;padding:1rem}}

/* drawer overlay */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:140}
.drawer-overlay.open{display:block}

aside{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:1.2rem;box-shadow:0 2px 10px var(--sh);position:sticky;top:calc(44px + 1.4rem);max-height:calc(100vh - 44px - 3rem);overflow-y:auto}
@media(max-width:720px){
  aside{position:fixed;top:0;left:0;bottom:0;width:260px;border-radius:0 16px 16px 0;z-index:150;transform:translateX(-110%);transition:transform .25s ease;max-height:100vh}
  aside.open{transform:translateX(0);box-shadow:4px 0 32px rgba(0,0,0,.25)}
}
.sec{margin-bottom:1.1rem}
.sec:last-child{margin-bottom:0}
.sec-lbl{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);margin-bottom:.5rem;padding-left:.25rem}
.search-wrap{position:relative}
.search-wrap::before{content:'⌕';position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem;pointer-events:none}
.sbox{width:100%;background:var(--panel);border:1.5px solid var(--border);color:var(--text);font-family:'Outfit',sans-serif;font-size:.8rem;padding:.46rem .7rem .46rem 2rem;border-radius:10px;outline:none;transition:border-color .18s,box-shadow .18s}
.sbox:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-s)}
.sbox::placeholder{color:var(--muted)}
.fg{display:flex;flex-direction:column;gap:.18rem}
.fb{background:none;border:1.5px solid transparent;color:var(--text2);font-family:'Outfit',sans-serif;font-size:.79rem;padding:.34rem .6rem;text-align:left;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:.5rem;transition:all .14s;white-space:nowrap;overflow:hidden}
.fb:hover{background:var(--panel);color:var(--text)}
.fb.on{background:var(--acc-s);border-color:rgba(196,127,94,.38);color:var(--acc);font-weight:500}
.fav-fb.on{background:rgba(255,200,50,.12);border-color:rgba(200,160,0,.3);color:#b08a00}
[data-theme="dark"] .fav-fb.on{color:#d4b040}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cc{margin-left:auto;font-size:.6rem;background:var(--panel);border:1px solid var(--border);border-radius:100px;padding:.04rem .38rem;color:var(--muted)}
.sort-bar{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap}
.rinfo{font-size:.75rem;color:var(--muted)}
.rinfo strong{color:var(--text);font-weight:600}
.sort-group{margin-left:auto;display:flex;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.sb{background:none;border:none;border-right:1px solid var(--border);color:var(--muted);font-family:'Outfit',sans-serif;font-size:.72rem;font-weight:500;padding:.34rem .78rem;cursor:pointer;transition:all .14s;white-space:nowrap}
.sb:last-child{border-right:none}
.sb:hover{background:var(--panel);color:var(--text)}
.sb.on{background:var(--acc);color:#fff}
/* view mode toggle */
.view-toggle{display:none}
.vt-btn{display:none}

/* ── CONTEST GROUP LAYOUT ── */
.cg-wrap{display:flex;flex-direction:column;gap:1.2rem}
.cg-section{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;animation:rise .3s ease both;box-shadow:0 2px 10px var(--sh)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.cg-contest-header{display:flex;align-items:center;gap:.7rem;padding:.65rem 1.1rem;background:var(--panel);border-bottom:1.5px solid var(--border)}
.cg-contest-name{font-size:.88rem;font-weight:700;color:var(--text);letter-spacing:.02em}
.cg-contest-cnt{font-size:.63rem;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:.06rem .45rem;font-weight:500}
.cg-row{display:flex;align-items:flex-start;gap:1rem;padding:1.1rem 1.1rem;border-bottom:1px solid var(--border);min-height:84px}
.cg-row:last-child{border-bottom:none}
.cg-row:hover{background:color-mix(in srgb,var(--panel) 60%,transparent)}
.cg-user{font-size:.75rem;font-weight:600;color:var(--text2);white-space:nowrap;min-width:100px;flex-shrink:0;padding-top:.55rem}
.cg-user-none{color:var(--muted);font-weight:400}
.cg-pills{display:flex;flex-wrap:wrap;gap:.5rem;flex:1}
/* mini card pill */
.cg-pill{display:flex;flex-direction:column;background:var(--pb,var(--panel));border:1.5px solid color-mix(in srgb,var(--pc,var(--border)) 30%,transparent);border-radius:10px;width:120px;cursor:pointer;transition:all .16s;font-family:'Outfit',sans-serif;overflow:hidden;text-align:left}
.cg-pill:hover{transform:translateY(-2px);box-shadow:0 5px 16px var(--sh-m);border-color:color-mix(in srgb,var(--pc,var(--border)) 60%,transparent)}
.cg-pill.cg-fav{outline:2px solid #c9a030;outline-offset:1px}
.cg-pill-head{display:flex;align-items:center;justify-content:space-between;padding:.38rem .5rem .2rem}
.cg-pill-label{font-size:.9rem;font-weight:800;color:var(--pc)}
.cg-pill-lang{font-size:.56rem;font-weight:600;border-radius:100px;padding:.06rem .35rem}
.cg-pill-preview{font-family:'JetBrains Mono',monospace;font-size:.58rem;line-height:1.55;color:var(--text2);padding:.1rem .5rem .4rem;max-height:52px;overflow:hidden;white-space:pre;mask-image:linear-gradient(180deg,#000 40%,transparent);opacity:.8}
.cg-fav-star{font-size:.6rem;color:#c9a030;margin-left:.15rem}
@media(max-width:720px){
  .cg-row{flex-wrap:wrap;gap:.5rem}
  .cg-user{min-width:unset;font-size:.7rem;padding-top:0;width:100%}
  .cg-pill{width:100px}
}

/* ── PROBLEM DIFFICULTY COLORS ── */
.cg-pill[data-diff="A"]{--pc:#2e9e5b;--pb:#e8f7ee}
.cg-pill[data-diff="B"]{--pc:#3a7ec4;--pb:#e8f1fb}
.cg-pill[data-diff="C"]{--pc:#c4a020;--pb:#faf6e0}
.cg-pill[data-diff="D"]{--pc:#c47030;--pb:#faeee3}
.cg-pill[data-diff="E"]{--pc:#b03060;--pb:#fae8ee}
.cg-pill[data-diff="F"]{--pc:#8040b0;--pb:#f3e8fa}
.cg-pill[data-diff="G"]{--pc:#207070;--pb:#e3f4f4}
.cg-pill[data-diff="H"]{--pc:#505050;--pb:#efefef}
[data-theme="dark"] .cg-pill[data-diff="A"]{--pc:#5dcc88;--pb:#0d2318}
[data-theme="dark"] .cg-pill[data-diff="B"]{--pc:#6aaae8;--pb:#0d1a2e}
[data-theme="dark"] .cg-pill[data-diff="C"]{--pc:#e0c040;--pb:#251e00}
[data-theme="dark"] .cg-pill[data-diff="D"]{--pc:#e89050;--pb:#271500}
[data-theme="dark"] .cg-pill[data-diff="E"]{--pc:#e06090;--pb:#270010}
[data-theme="dark"] .cg-pill[data-diff="F"]{--pc:#b070e0;--pb:#1a0028}
[data-theme="dark"] .cg-pill[data-diff="G"]{--pc:#40b0b0;--pb:#001818}
[data-theme="dark"] .cg-pill[data-diff="H"]{--pc:#909090;--pb:#1a1a1a}
.backdrop{display:none;position:fixed;inset:0;background:rgba(50,38,28,.42);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center;padding:1.5rem}
.backdrop.open{display:flex}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;width:100%;max-width:860px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(60,45,35,.22);animation:popIn .22s cubic-bezier(.34,1.56,.64,1);overflow:hidden}
@keyframes popIn{from{opacity:0;transform:scale(.94) translateY(8px)}to{opacity:1;transform:none}}
.modal-head{padding:.85rem 1.1rem;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:.7rem;flex-shrink:0;background:var(--panel)}
.minfo{flex:1;min-width:0;display:flex;align-items:center;gap:.65rem;flex-wrap:wrap}
.mfname{font-size:.95rem;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'JetBrains Mono',monospace}
.mmeta-chips{display:flex;gap:.35rem;align-items:center;flex-wrap:wrap}
.mmeta-chip{font-size:.62rem;color:var(--text2);background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:.08rem .45rem;white-space:nowrap;font-weight:500}
.mmeta-chip.lang{font-weight:700}
.macts{display:flex;gap:.38rem;flex-shrink:0;flex-wrap:wrap}
.abt{background:var(--surface);border:1.5px solid var(--border);color:var(--text2);font-family:'Outfit',sans-serif;font-size:.73rem;font-weight:500;padding:.3rem .75rem;border-radius:9px;cursor:pointer;transition:all .14s}
.abt:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-s)}
.abt.x:hover{border-color:#c96b6b;color:#c96b6b;background:rgba(201,107,107,.08)}
.abt:disabled{opacity:.3;cursor:default}
.abt:disabled:hover{border-color:var(--border);color:var(--text2);background:var(--surface)}
.abt.fav-on{color:#b08a00;border-color:rgba(200,160,0,.4);background:rgba(255,200,50,.1)}
.modal-body{overflow-y:auto;flex:1;background:var(--modal-bg)}
.modal-body pre{margin:0;border-radius:0;background:var(--modal-bg)!important}

/* line numbers */
.code-with-lines{display:flex}
.line-nums{flex-shrink:0;user-select:none;padding:1.3rem .7rem 1.3rem .9rem;font-family:'JetBrains Mono',monospace;font-size:.79rem;line-height:1.8;color:var(--muted);text-align:right;background:var(--panel);border-right:1px solid var(--border);min-width:2.8rem;white-space:pre}
.hljs-code-wrap{flex:1;overflow-x:auto}
.modal-body code.hljs{font-family:'JetBrains Mono',monospace!important;font-size:.79rem!important;line-height:1.8!important;padding:1.3rem 1.5rem!important;background:var(--modal-bg)!important}
.bf-view{font-family:'JetBrains Mono',monospace;font-size:.79rem;line-height:1.9;padding:1.3rem 1.5rem;white-space:pre-wrap;word-break:break-all;background:var(--modal-bg)}
.ws-legend{display:flex;gap:1rem;padding:.55rem 1.4rem;border-bottom:1px solid var(--border);background:var(--panel);font-size:.68rem;color:var(--muted);flex-wrap:wrap;align-items:center}
.ws-legend span{display:flex;align-items:center;gap:.3rem}
.ws-view{font-family:'JetBrains Mono',monospace;font-size:.77rem;line-height:2.05;padding:1.3rem 1.5rem;background:var(--modal-bg)}
.S{background:#dff0e8;border-radius:3px;padding:1px 4px;color:#7aab8c}
.T{background:#e8eef7;border-radius:3px;padding:1px 4px;color:#7a9dbf}
.LF{color:var(--muted)}
.OT{color:var(--border-s);text-decoration:line-through}

/* states */
.sbox-s{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2rem;gap:1rem;color:var(--muted);font-size:.82rem;text-align:center}
.spin{width:26px;height:26px;border:2.5px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-card{background:rgba(201,107,107,.07);border:1.5px solid rgba(201,107,107,.3);border-radius:14px;padding:1.3rem 1.5rem;font-size:.79rem;color:#a0503a;line-height:1.85;display:none;margin-bottom:1rem}
.err-card code{font-family:'JetBrains Mono',monospace;background:var(--panel);border-radius:6px;padding:.5rem .8rem;display:block;margin:.3rem 0;color:var(--text);font-size:.73rem}

/* ════════ RANKINGS ═════════════════════════════════ */
#rankingsView{padding:2rem 2.5rem 3rem;max-width:900px;margin:0 auto}
@media(max-width:720px){#rankingsView{padding:1.2rem}}
.view-heading{font-size:1.25rem;font-weight:700;color:var(--text);margin-bottom:1.4rem;display:flex;align-items:center;gap:.6rem}
.view-heading::before{content:'';display:inline-block;width:4px;height:1.1em;background:var(--acc);border-radius:2px;flex-shrink:0}
.rank-table{width:100%;border-collapse:collapse;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 2px 10px var(--sh)}
.rank-table th{background:var(--panel);font-size:.67rem;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);padding:.65rem 1rem;text-align:left;border-bottom:1.5px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;transition:color .14s}
.rank-table th:hover{color:var(--text)}
.rank-table th.asc::after{content:' ↑';color:var(--acc)}
.rank-table th.desc::after{content:' ↓';color:var(--acc)}
.rank-table td{padding:.6rem 1rem;font-size:.83rem;color:var(--text2);border-bottom:1px solid var(--border)}
.rank-table tr:last-child td{border-bottom:none}
.rank-table tr:hover td{background:var(--panel)}
.rank-num{font-size:.72rem;color:var(--muted);font-weight:600;text-align:center}
.rank-num.gold{color:#c9a030}
.rank-num.silver{color:#909090}
.rank-num.bronze{color:#a06040}
.rank-user{font-weight:600;color:var(--text);display:flex;align-items:center;gap:.5rem}
.rank-avatar{width:26px;height:26px;border-radius:50%;background:var(--acc-s);border:1.5px solid var(--acc);display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;color:var(--acc);flex-shrink:0}
.rank-bar{display:flex;align-items:center;gap:.5rem}
.rank-bar-track{width:72px;height:6px;background:var(--panel);border-radius:100px;overflow:hidden;flex-shrink:0}
.rank-bar-fill{height:100%;border-radius:100px;background:var(--acc)}
.lang-chips{display:flex;gap:.3rem;flex-wrap:wrap}
.lang-chip-sm{font-size:.56rem;font-weight:600;padding:.1rem .35rem;border-radius:100px}

/* ════════ PROGRESS ═════════════════════════════════ */
#progressView{padding:2rem 2.5rem 3rem;max-width:100%;margin:0 auto}
@media(max-width:720px){#progressView{padding:1.2rem}}
.pg-table-wrap{overflow-x:auto;border:1.5px solid var(--border);border-radius:14px;background:var(--surface);box-shadow:0 2px 10px var(--sh)}
.pg-table{border-collapse:collapse;min-width:max-content}
.pg-table th{background:var(--panel);border-right:1px solid var(--border);border-bottom:1.5px solid var(--border);font-size:.6rem;font-weight:600;color:var(--muted);writing-mode:vertical-rl;padding:.5rem .3rem;position:sticky;top:0;z-index:1;min-height:60px;white-space:nowrap}
.pg-table th.corner{background:var(--panel);border-right:1.5px solid var(--border);position:sticky;left:0;z-index:3;min-width:110px;writing-mode:horizontal-tb}
.pg-table td{border-right:1px solid var(--border);border-bottom:1px solid var(--border);text-align:center;font-size:.75rem;font-weight:600;min-width:44px;padding:.3rem;transition:background .1s}
.pg-table td.user-col{font-size:.78rem;font-weight:600;color:var(--text);border-right:1.5px solid var(--border);white-space:nowrap;background:var(--surface);position:sticky;left:0;z-index:2;padding:.38rem .7rem;min-width:110px}
.pg-0{background:var(--panel);color:transparent}
.pg-1{background:rgba(122,171,140,.22);color:var(--acc2)}
.pg-2{background:rgba(122,171,140,.42);color:#3a8060}
.pg-3{background:rgba(122,171,140,.62);color:#1a6040}
.pg-hi{background:rgba(122,171,140,.82);color:#0a4030}
[data-theme="dark"] .pg-1{color:var(--acc2)}
[data-theme="dark"] .pg-2{color:#9ad4b8}
[data-theme="dark"] .pg-3{color:#bce8d0}
[data-theme="dark"] .pg-hi{color:#dff5eb}
.pg-legend{display:flex;align-items:center;gap:.5rem;margin-top:.75rem;font-size:.68rem;color:var(--muted)}
.pg-swatch{width:14px;height:14px;border-radius:3px}

/* ════════ PWA BANNER ═══════════════════════════════ */
#pwaBanner{display:none;position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);z-index:300;background:var(--surface);border:1.5px solid var(--border);border-radius:16px;box-shadow:0 8px 32px var(--sh-m);padding:.85rem 1.1rem;align-items:center;gap:.8rem;max-width:360px;width:calc(100% - 2rem);animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
.pwa-icon{font-size:1.6rem;flex-shrink:0}
.pwa-text{flex:1;min-width:0}
.pwa-text strong{font-size:.84rem;font-weight:700;color:var(--text);display:block}
.pwa-text span{font-size:.7rem;color:var(--muted)}
.pwa-install{background:var(--acc);color:#fff;border:none;font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600;padding:.42rem 1rem;border-radius:100px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.pwa-install:hover{background:#b36e4d}
.pwa-close{background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:.2rem;line-height:1;flex-shrink:0}
.pwa-close:hover{color:var(--text)}
</style>
</head>
<body>

<div id="pwaBanner">
  <div class="pwa-icon">🏆</div>

<!-- NAV -->

  <div class="home-hero">

      <div class="hstat"><div class="hstat-n" id="hLangs">—</div><div class="hstat-l">Languages</div></div>
      <div class="hstat" id="hUsersStat" style="display:none"><div class="hstat-n" id="hUsers">—</div><div class="hstat-l">Users</div></div>

  <div class="home-grid">
    <div class="home-card"><div class="home-card-title">Language Breakdown</div><div class="lang-bar-row" id="langBars"><div class="sbox-s" style="padding:1.5rem"><div class="spin"></div></div></div></div>
    <div class="home-card"><div class="home-card-title">Recent Solutions</div><div class="recent-list" id="recentList"><div class="sbox-s" style="padding:1.5rem"><div class="spin"></div></div></div></div>
    <div class="home-card" style="grid-column:1/-1"><div class="home-card-title">Contests</div><div class="contest-scroll"><div id="contestRows"><div class="sbox-s" style="padding:1.5rem"><div class="spin"></div></div></div></div></div>

<!-- ARCHIVE -->

  <aside id="sidebar">
    <div class="sec">
      <div class="sec-lbl">Search</div>

    </div>

        <button class="sb on" data-sort="contest-desc">Contest ↓</button>

        <button class="sb" data-sort="lang">Lang</button>

<!-- PROGRESS -->

  <div class="view-heading">Contest Progress by User</div>

</div>

<!-- MODAL -->
<div class="backdrop" id="backdrop">
  <div class="modal">
    <div class="modal-head">
      <div class="minfo">
        <div class="mfname" id="mFname"></div>
        <div class="mmeta-chips" id="mMetaChips"></div>
      </div>
      <div class="macts">
        <button class="abt" id="prevBtn">←</button>
        <button class="abt" id="nextBtn">→</button>
        <button class="abt" id="favModalBtn">☆</button>
        <button class="abt" id="copyBtn">Copy</button>
        <button class="abt x" id="closeBtn">✕</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody"><div class="sbox-s"><div class="spin"></div></div></div>
  </div>
</div>

<script>
/* ════ LANG META ════════════════════════════════════ */
const LANGS={
  py:{label:'Python',color:'#5a9fd4',bg:'#edf4fb',hljs:'python'},
  c:{label:'C',color:'#7a7abf',bg:'#f0f0fa',hljs:'c'},
  cpp:{label:'C++',color:'#c9687a',bg:'#fbeeef',hljs:'cpp'},
  cc:{label:'C++',color:'#c9687a',bg:'#fbeeef',hljs:'cpp'},
  java:{label:'Java',color:'#c48c3a',bg:'#faf3e6',hljs:'java'},
  rs:{label:'Rust',color:'#b07458',bg:'#f8ede8',hljs:'rust'},
  js:{label:'JS',color:'#c9b030',bg:'#faf7e0',hljs:'javascript'},
  rb:{label:'Ruby',color:'#c04040',bg:'#fde8e8',hljs:'ruby'},
  bf:{label:'Brainfuck',color:'#8c7ab5',bg:'#f2eff9',hljs:'brainfuck',esoteric:true},
  b:{label:'Brainfuck',color:'#8c7ab5',bg:'#f2eff9',hljs:'brainfuck',esoteric:true},
  ws:{label:'Whitespace',color:'#7aab8c',bg:'#eaf3ee',hljs:'whitespace',esoteric:true},
  hs:{label:'Haskell',color:'#6a7db5',bg:'#eef0f9',hljs:'haskell'},
  go:{label:'Go',color:'#5ab5b5',bg:'#e8f6f6',hljs:'go'},
  sh:{label:'Shell',color:'#7ab56a',bg:'#edf7ea',hljs:'bash'},
  pl:{label:'Perl',color:'#a06090',bg:'#f5ecf4',hljs:'perl'},
  php:{label:'PHP',color:'#7a8abf',bg:'#eef0fa',hljs:'php'},
  kt:{label:'Kotlin',color:'#a07ab5',bg:'#f4eef9',hljs:'kotlin'},
  swift:{label:'Swift',color:'#c97040',bg:'#faeee8',hljs:'swift'},
  cs:{label:'C#',color:'#5a8a5a',bg:'#eaf4ea',hljs:'csharp'},
};
const SRC_EXTS=new Set(Object.keys(LANGS));
const getLang=e=>LANGS[e]||{label:e.toUpperCase(),color:'#a8998e',bg:'#f0ece4',hljs:e};

/* ════ DARK MODE ════════════════════════════════════ */
function isDark(){return document.documentElement.dataset.theme==='dark'}
function applyTheme(dark){
  document.documentElement.dataset.theme=dark?'dark':'';
  document.getElementById('darkBtn').textContent=dark?'☀️':'🌙';
  document.getElementById('hljsTheme').href=dark
    ?'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/one-dark.min.css'
    :'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/one-light.min.css';
}
function toggleDark(){
  const d=!isDark();
  applyTheme(d);
  try{localStorage.setItem('atcoder-theme',d?'dark':'')}catch(_){}
}
(()=>{
  try{const t=localStorage.getItem('atcoder-theme');if(t==='dark')applyTheme(true)}catch(_){}
  document.getElementById('darkBtn').textContent=isDark()?'☀️':'🌙';
})();

/* ════ MOBILE DRAWER ════════════════════════════════ */
function openDrawer(){document.getElementById('sidebar').classList.add('open');document.getElementById('drawerOverlay').classList.add('open')}
function closeDrawer(){document.getElementById('sidebar').classList.remove('open');document.getElementById('drawerOverlay').classList.remove('open')}

/* ════ FAVORITES ════════════════════════════════════ */
let favs=new Set();
(()=>{try{const d=localStorage.getItem('atcoder-favs');if(d)favs=new Set(JSON.parse(d))}catch(_){}})();
function saveFavs(){try{localStorage.setItem('atcoder-favs',JSON.stringify([...favs]))}catch(_){}}
function toggleFav(url){
  favs.has(url)?favs.delete(url):favs.add(url);
  saveFavs();
  document.getElementById('favCount').textContent=favs.size;
  document.getElementById('favModalBtn').className='abt'+(favs.has(url)?' fav-on':'');
  document.getElementById('favModalBtn').textContent=favs.has(url)?'★':'☆';
  renderCards();
}
document.getElementById('favCount').textContent=favs.size;
let fFav=false;
function toggleFavFilter(){
  fFav=!fFav;
  document.getElementById('favFilterBtn').classList.toggle('on',fFav);
  syncToURL();renderCards();
}

/* ════ PARSE ════════════════════════════════════════ */
function parseURL(fullUrl){
  const archIdx=fullUrl.indexOf('archive/');
  const rel=archIdx>=0?fullUrl.slice(archIdx+8):fullUrl.split('/').pop();
  const parts=rel.split('/');
  const filename=parts[parts.length-1];
  const dot=filename.lastIndexOf('.');
  if(dot<0)return null;
  const base=filename.slice(0,dot);
  const ext=filename.slice(dot+1).toLowerCase();
  if(!SRC_EXTS.has(ext))return null;
  const sep=base.search(/[_\-]/);
  const contest=sep>=0?base.slice(0,sep):base;
  const problem=sep>=0?base.slice(sep+1):'';
  const user=parts.length>1?parts[0]:'';
  const folder=parts.length>2?parts.slice(1,-1).join('/'):'';
  return{fullUrl,rel,filename,base,ext,contest,problem,user,folder,lang:getLang(ext)};
}
function contestKey(c){
  const m=c.match(/^(abc|arc|agc|ahc|apc|abl)0*(\d+)$/i);
  if(!m)return[99,c];
  const p={'abc':0,'arc':1,'agc':2,'ahc':3,'apc':4,'abl':5}[m[1].toLowerCase()]??6;
  return[p,parseInt(m[2],10)];
}
function cmpContest(a,b){const ka=contestKey(a),kb=contestKey(b);return ka[0]-kb[0]||ka[1]-kb[1]||a.localeCompare(b)}

/* ════ STATE ════════════════════════════════════════ */
let all=[],currentFiles=[];
let fLang='all',fUser='all',fContest='all',query='',sortKey='contest-desc';

/* ════ URL SYNC ═════════════════════════════════════ */
function syncToURL(){
  const p=new URLSearchParams();
  if(fLang!=='all')p.set('lang',fLang);
  if(fUser!=='all')p.set('user',fUser);
  if(fContest!=='all')p.set('contest',fContest);
  if(query)p.set('q',query);
  if(sortKey!=='contest-asc')p.set('sort',sortKey);
  if(fFav)p.set('fav','1');
  const hs=p.toString();
  history.replaceState(null,'',location.pathname+(hs?'#?'+hs:''));
}
function loadFromURL(){
  const hash=location.hash.slice(1);
  if(!hash.startsWith('?'))return;
  const p=new URLSearchParams(hash.slice(1));
  if(p.has('lang'))fLang=p.get('lang');
  if(p.has('user'))fUser=p.get('user');
  if(p.has('contest'))fContest=p.get('contest');
  if(p.has('q')){query=p.get('q');document.getElementById('searchBox').value=query}
  if(p.has('sort'))sortKey=p.get('sort');
  if(p.has('fav')){fFav=true;document.getElementById('favFilterBtn').classList.add('on')}
}
function syncUIFilters(){
  document.querySelectorAll('#langFilters .fb').forEach(b=>b.classList.toggle('on',b.dataset.lang===fLang));
  document.querySelectorAll('#userFilters .fb').forEach(b=>b.classList.toggle('on',b.dataset.user===fUser));
  document.querySelectorAll('#contestFilters .fb').forEach(b=>b.classList.toggle('on',b.dataset.contest===fContest));
  document.querySelectorAll('.sb').forEach(b=>b.classList.toggle('on',b.dataset.sort===sortKey));
}

/* ════ CONTENT CACHE ════════════════════════════════ */
const codeCache=new Map();
let cacheLoaded=0;
async function preloadContent(){
  const BATCH=6,total=all.length;
  for(let i=0;i<total;i+=BATCH){
    await Promise.all(all.slice(i,i+BATCH).map(async f=>{
      if(codeCache.has(f.fullUrl))return;
      try{codeCache.set(f.fullUrl,await fetch(f.fullUrl).then(r=>r.text()))}
      catch{codeCache.set(f.fullUrl,'')}
      cacheLoaded++;
    }));
    document.getElementById('codeSearchStatus').textContent=
      cacheLoaded<total?`コード検索: ${cacheLoaded}/${total} 読込中…`:'コード内容検索: 有効 ✓';
  }
  if(query)renderCards();
}

/* ════ BOOT ═════════════════════════════════════════ */
async function init(){
  setStatus('loading','Loading…');
  try{
    const resp=await fetch('archive/files.json');
    if(!resp.ok)throw new Error(`archive/files.json が見つかりません (HTTP ${resp.status})`);
    const list=await resp.json();
    if(!Array.isArray(list))throw new Error('archive/files.json の形式が不正です（配列が必要）');
    all=list
      .filter(p=>typeof p==='string'&&p.split('/').pop()!=='space.txt')
      .map(p=>parseURL(new URL('archive/'+p,document.baseURI).href))
      .filter(Boolean);
    if(!all.length)throw new Error('archive/ にソースコードが見つかりませんでした。');
  }catch(e){setStatus('err','Error');showErr(e.message);return}
  setStatus('ok',`${all.length} files`);
  buildHome();
  buildSidebar();
  loadFromURL();
  syncUIFilters();
  renderCards();
  buildProgress();
  preloadContent();
}
function setStatus(s,t){
  document.getElementById('statusDot').className='status-dot'+(s==='ok'?' ok':s==='loading'?' loading':s==='err'?' err':'');
  document.getElementById('statusText').textContent=t;
}

/* ════ VIEW ROUTER ══════════════════════════════════ */
function showView(name){
  // archiveViewはstyle.displayを直接操作しているのでリセット
  const av=document.getElementById('archiveView');
  av.style.display='';
  document.querySelectorAll('.view').forEach(el=>el.classList.toggle('active',el.id===name+'View'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.toggle('active',el.dataset.view===name));
  if(name==='archive'){
    av.style.display='grid';av.classList.add('active','fadein');
    setTimeout(()=>av.classList.remove('fadein'),400);
  }
  document.querySelector('.menu-btn').style.display=name==='archive'?'flex':'none';
  closeDrawer();
}
document.querySelectorAll('.nav-tab').forEach(b=>b.addEventListener('click',()=>showView(b.dataset.view)));

/* ════ HOME ═════════════════════════════════════════ */
function buildHome(){
  document.getElementById('hTotal').textContent=all.length;
  document.getElementById('hContests').textContent=new Set(all.map(f=>f.contest)).size;
  document.getElementById('hLangs').textContent=new Set(all.map(f=>f.ext)).size;
  const us=new Set(all.map(f=>f.user).filter(Boolean));
  if(us.size>0){document.getElementById('hUsersStat').style.display='';document.getElementById('hUsers').textContent=us.size}
  const byCnt={};
  all.forEach(f=>{byCnt[f.ext]=(byCnt[f.ext]||0)+1});
  const sorted=Object.entries(byCnt).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const max=sorted[0]?.[1]||1;
  document.getElementById('langBars').innerHTML=sorted.map(([e,cnt])=>{
    const m=getLang(e);
    return`<div class="lb-item"><span class="lb-name">${m.label}</span><div class="lb-track"><div class="lb-fill" style="width:${(cnt/max*100).toFixed(1)}%;background:${m.color}"></div></div><span class="lb-cnt">${cnt}</span></div>`;
  }).join('');
  const recent=[...all].sort((a,b)=>cmpContest(b.contest,a.contest)||b.filename.localeCompare(a.filename)).slice(0,8);
  document.getElementById('recentList').innerHTML=recent.map(f=>`
    <div class="recent-item" onclick="openFileFromHome('${CSS.escape(f.fullUrl)}')">
      <span class="recent-fname">${f.filename}</span>
      <span class="recent-chip" style="background:${f.lang.bg};color:${f.lang.color}">${f.lang.label}</span>
    </div>`).join('');
  const byC={};
  all.forEach(f=>{if(!byC[f.contest])byC[f.contest]={files:[],exts:new Set()};byC[f.contest].files.push(f);byC[f.contest].exts.add(f.ext)});
  document.getElementById('contestRows').innerHTML=Object.entries(byC).sort((a,b)=>cmpContest(a[0],b[0])).map(([c,{files,exts}])=>{
    const chips=[...exts].map(e=>{const m=getLang(e);return`<span style="background:${m.bg};color:${m.color};font-size:.58rem;font-weight:600;padding:.1rem .4rem;border-radius:100px">${m.label}</span>`}).join('');
    return`<div class="contest-row" onclick="filterToContest('${c}')"><span class="contest-row-name">${c}</span><span class="contest-row-meta">${chips}<span>${files.length} files</span></span></div>`;
  }).join('');
}
function openFileFromHome(url){const f=all.find(x=>x.fullUrl===url)||all.find(x=>CSS.escape(x.fullUrl)===url);if(f)openModal(f)}
function filterToContest(c){
  fContest=c;
  document.querySelectorAll('#contestFilters .fb').forEach(b=>b.classList.toggle('on',b.dataset.contest===c));
  syncToURL();renderCards();showView('archive');
}

/* ════ SIDEBAR ══════════════════════════════════════ */
function buildSidebar(){
  const exts=[...new Set(all.map(f=>f.ext))].sort();
  const lf=document.getElementById('langFilters');
  lf.innerHTML=`<button class="fb on" data-lang="all"><span class="ldot" style="background:var(--muted)"></span>All</button>`;
  exts.forEach(e=>{
    const m=getLang(e);
    lf.insertAdjacentHTML('beforeend',`<button class="fb" data-lang="${e}"><span class="ldot" style="background:${m.color}"></span>${m.label}</button>`);
  });
  lf.addEventListener('click',e=>{
    const b=e.target.closest('[data-lang]');if(!b)return;
    fLang=b.dataset.lang;lf.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');syncToURL();renderCards();
  });
  const users=[...new Set(all.map(f=>f.user).filter(Boolean))].sort();
  if(users.length>0){
    document.getElementById('userSection').style.display='';
    const uf=document.getElementById('userFilters');
    uf.innerHTML=`<button class="fb on" data-user="all">All</button>`;
    users.forEach(u=>{
      const cnt=all.filter(f=>f.user===u).length;
      uf.insertAdjacentHTML('beforeend',`<button class="fb" data-user="${u}">👤 ${u}<span class="cc">${cnt}</span></button>`);
    });
    uf.addEventListener('click',e=>{
      const b=e.target.closest('[data-user]');if(!b)return;
      fUser=b.dataset.user;uf.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');syncToURL();renderCards();
    });
  }
  const contests=[...new Set(all.map(f=>f.contest))].sort((a,b)=>cmpContest(a,b));
  const cf=document.getElementById('contestFilters');
  cf.innerHTML=`<button class="fb on" data-contest="all">All</button>`;
  contests.forEach(c=>{
    const cnt=all.filter(f=>f.contest===c).length;
    cf.insertAdjacentHTML('beforeend',`<button class="fb" data-contest="${c}">${c}<span class="cc">${cnt}</span></button>`);
  });
  cf.addEventListener('click',e=>{
    const b=e.target.closest('[data-contest]');if(!b)return;
    fContest=b.dataset.contest;cf.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');syncToURL();renderCards();
  });
}

/* ════ SEARCH / SORT ════════════════════════════════ */
document.getElementById('searchBox').addEventListener('input',e=>{query=e.target.value.toLowerCase();syncToURL();renderCards()});
document.addEventListener('click',e=>{
  const b=e.target.closest('.sb');if(!b)return;
  sortKey=b.dataset.sort;document.querySelectorAll('.sb').forEach(x=>x.classList.remove('on'));b.classList.add('on');syncToURL();renderCards();
});
function filtered(){
  return all.filter(f=>{
    if(fLang!=='all'&&f.ext!==fLang)return false;
    if(fUser!=='all'&&f.user!==fUser)return false;
    if(fContest!=='all'&&f.contest!==fContest)return false;
    if(fFav&&!favs.has(f.fullUrl))return false;
    if(query){
      const inName=f.filename.toLowerCase().includes(query)||f.rel.toLowerCase().includes(query);
      const cached=codeCache.get(f.fullUrl);
      if(!inName&&!(cached!==undefined&&cached.toLowerCase().includes(query)))return false;
    }
    return true;
  }).sort((a,b)=>{
    switch(sortKey){
      case'contest-asc':return cmpContest(a.contest,b.contest)||a.filename.localeCompare(b.filename);
      case'contest-desc':return cmpContest(b.contest,a.contest)||a.filename.localeCompare(b.filename);
      case'lang':return a.ext.localeCompare(b.ext)||a.filename.localeCompare(b.filename);
      default:return a.filename.localeCompare(b.filename);
    }
  });
}

/* ════ RENDER CARDS ═════════════════════════════════ */
function renderCards(){
  currentFiles=filtered();
  const cw=document.getElementById('cardsWrap');
  document.getElementById('sortBar').style.display='flex';
  document.getElementById('rinfo').innerHTML=`<strong>${currentFiles.length}</strong> / ${all.length} files`;
  if(!currentFiles.length){cw.className='sbox-s';cw.innerHTML=`<span style="font-size:2rem;opacity:.3">🍃</span><span>No results</span>`;return}
  cw.className='';cw.innerHTML='';

  // contest → user → files
  const byContest=new Map();
  currentFiles.forEach(f=>{
    if(!byContest.has(f.contest))byContest.set(f.contest,new Map());
    const byUser=byContest.get(f.contest);
    const ukey=f.user||'';
    if(!byUser.has(ukey))byUser.set(ukey,[]);
    byUser.get(ukey).push(f);
  });

  const wrap=document.createElement('div');
  wrap.className='cg-wrap';

  [...byContest.entries()].forEach(([contest,byUser],ci)=>{
    const section=document.createElement('div');
    section.className='cg-section';
    section.style.animationDelay=`${ci*30}ms`;

    const totalFiles=[...byUser.values()].flat().length;
    section.innerHTML=`<div class="cg-contest-header"><span class="cg-contest-name">${contest}</span><span class="cg-contest-cnt">${totalFiles} files</span></div>`;

    [...byUser.entries()].forEach(([user,files])=>{
      // sort files by problem letter
      files.sort((a,b)=>a.problem.localeCompare(b.problem)||a.ext.localeCompare(b.ext));
      const row=document.createElement('div');
      row.className='cg-row';
      const userLabel=user
        ?`<div class="cg-user">👤 ${user}</div>`
        :`<div class="cg-user cg-user-none">—</div>`;
      row.innerHTML=userLabel;
      const pills=document.createElement('div');
      pills.className='cg-pills';
      files.forEach(f=>{
        const isFav=favs.has(f.fullUrl);
        const pill=document.createElement('button');
        const diff=(f.problem?f.problem.slice(0,1):'?').toUpperCase();
        pill.className='cg-pill'+(isFav?' cg-fav':'');
        pill.dataset.diff=diff;
        const label=f.problem?f.problem.toUpperCase():f.base;
        const starHtml=isFav?`<span class="cg-fav-star">★</span>`:'';
        pill.innerHTML=`
          <div class="cg-pill-head">
            <span class="cg-pill-label">${label}${starHtml}</span>
            <span class="cg-pill-lang" style="background:${f.lang.bg};color:${f.lang.color}">${f.lang.label}</span>
          </div>
          <div class="cg-pill-preview" id="prev_${f.base}_${f.ext}">…</div>`;
        pill.title=f.filename;
        pill.addEventListener('click',()=>{
          const idx=currentFiles.indexOf(f);
          openModal(f,idx>=0?idx:0);
        });
        pills.appendChild(pill);
        // load preview
        const pid=`prev_${f.base}_${f.ext}`;
        if(codeCache.has(f.fullUrl)){
          const el=document.getElementById(pid);
          if(el)el.textContent=codeCache.get(f.fullUrl).slice(0,200);
        } else {
          fetch(f.fullUrl).then(r=>r.text()).then(code=>{
            codeCache.set(f.fullUrl,code);
            const el=document.getElementById(pid);
            if(el)el.textContent=code.slice(0,200);
          }).catch(()=>{const el=document.getElementById(pid);if(el)el.textContent='—'});
        }
      });
      row.appendChild(pills);
      section.appendChild(row);
    });
    wrap.appendChild(section);
  });
  cw.appendChild(wrap);
}

/* ════ MODAL ════════════════════════════════════════ */
let _code='',_curIdx=-1;
async function openModal(f,idx){
  _curIdx=idx??currentFiles.findIndex(x=>x.fullUrl===f.fullUrl);
  await _renderModalFile(f);
}
async function _renderModalFile(f){
  document.getElementById('mFname').textContent=f.filename;
  const chips=[
    `<span class="mmeta-chip lang" style="background:${f.lang.bg};color:${f.lang.color};border-color:${f.lang.color}40">${f.lang.label}</span>`,
    `<span class="mmeta-chip">${f.contest}</span>`,
    f.problem?`<span class="mmeta-chip">· ${f.problem}</span>`:'',
    f.user?`<span class="mmeta-chip" style="color:var(--acc2)">👤 ${f.user}</span>`:'',
    f.folder?`<span class="mmeta-chip">📂 ${f.folder}</span>`:'',
  ].filter(Boolean).join('');
  document.getElementById('mMetaChips').innerHTML=chips;
  document.getElementById('modalBody').innerHTML=`<div class="sbox-s"><div class="spin"></div></div>`;
  document.getElementById('backdrop').classList.add('open');
  const favBtn=document.getElementById('favModalBtn');
  favBtn.className='abt'+(favs.has(f.fullUrl)?' fav-on':'');
  favBtn.textContent=favs.has(f.fullUrl)?'★':'☆';
  favBtn.onclick=()=>toggleFav(f.fullUrl);
  document.getElementById('prevBtn').disabled=_curIdx<=0;
  document.getElementById('nextBtn').disabled=_curIdx>=currentFiles.length-1;
  try{
    _code=codeCache.has(f.fullUrl)?codeCache.get(f.fullUrl):await fetch(f.fullUrl).then(r=>r.text());
    codeCache.set(f.fullUrl,_code);
  }catch{document.getElementById('modalBody').innerHTML=`<div class="sbox-s">⚠ Load failed</div>`;return}
  if(f.ext==='ws')renderWS(_code);
  else if(f.ext==='bf'||f.ext==='b')renderBF(_code);
  else{
    const pre=document.createElement('pre');
    const el=document.createElement('code');
    el.className=`language-${f.lang.hljs}`;el.textContent=_code;
    pre.appendChild(el);hljs.highlightElement(el);
    // line numbers
    const lines=_code.split('\n');
    const lineCount=lines.length;
    const lnEl=document.createElement('div');
    lnEl.className='line-nums';
    lnEl.textContent=Array.from({length:lineCount},(_,i)=>i+1).join('\n');
    // line count chip in header
    const existingLc=document.querySelector('.mmeta-chip.lc');
    if(!existingLc){
      const lcChip=document.createElement('span');
      lcChip.className='mmeta-chip lc';lcChip.textContent=`${lineCount} lines`;
      document.getElementById('mMetaChips').appendChild(lcChip);
    }
    const codeWrap=document.createElement('div');
    codeWrap.className='hljs-code-wrap';codeWrap.appendChild(pre);
    const wrap=document.createElement('div');
    wrap.className='code-with-lines';wrap.appendChild(lnEl);wrap.appendChild(codeWrap);
    document.getElementById('modalBody').innerHTML='';
    document.getElementById('modalBody').appendChild(wrap);
  }
}
document.getElementById('prevBtn').addEventListener('click',()=>{if(_curIdx>0){_curIdx--;_renderModalFile(currentFiles[_curIdx])}});
document.getElementById('nextBtn').addEventListener('click',()=>{if(_curIdx<currentFiles.length-1){_curIdx++;_renderModalFile(currentFiles[_curIdx])}});
function renderBF(code){
  const C={'>':'#c96b6b','<':'#6b9bc9','+':'#7ab58c','-':'#b58c7a','.':'#c9aa5a',',':'#a07ab5','[':'#c9b030',']':'#c9b030'};
  document.getElementById('modalBody').innerHTML=`<div class="bf-view">${[...code].map(ch=>C[ch]?`<span style="color:${C[ch]};font-weight:600">${ch}</span>`:ch==='\n'?'\n':`<span style="color:var(--muted)">${esc(ch)}</span>`).join('')}</div>`;
}
function renderWS(code){
  const leg=`<div class="ws-legend"><span><span class="S">S</span>Space</span><span><span class="T">T</span>Tab</span><span><span class="LF">↵</span>Newline</span><span style="font-size:.6rem;font-style:italic">（他の文字はWhitespace処理系では無視されます）</span></div>`;
  document.getElementById('modalBody').innerHTML=`${leg}<div class="ws-view">${[...code].map(ch=>ch===' '?'<span class="S">S</span>':ch==='\t'?'<span class="T">T</span>':ch==='\n'?'<span class="LF">↵\n</span>':`<span class="OT">${esc(ch)}</span>`).join('')}</div>`;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
document.getElementById('closeBtn').addEventListener('click',()=>document.getElementById('backdrop').classList.remove('open'));
document.getElementById('backdrop').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('backdrop').classList.remove('open')});
document.addEventListener('keydown',e=>{
  if(!document.getElementById('backdrop').classList.contains('open'))return;
  if(e.key==='Escape')document.getElementById('backdrop').classList.remove('open');
  if(e.key==='ArrowLeft'&&_curIdx>0){_curIdx--;_renderModalFile(currentFiles[_curIdx])}
  if(e.key==='ArrowRight'&&_curIdx<currentFiles.length-1){_curIdx++;_renderModalFile(currentFiles[_curIdx])}
});
document.getElementById('copyBtn').addEventListener('click',function(){
  navigator.clipboard.writeText(_code).then(()=>{this.textContent='Copied!';setTimeout(()=>this.textContent='Copy',1500)});
});

/* ════ RANKINGS ═════════════════════════════════════ */
let rankSort='files',rankDir=-1;
function buildRankings(){
  const users=[...new Set(all.map(f=>f.user).filter(Boolean))];
  if(!users.length){
    document.getElementById('rankingsContent').innerHTML=`<div class="sbox-s"><span>ユーザーフォルダがありません。<br>archive/ 直下にユーザー名フォルダを作成してください。</span></div>`;
    return;
  }
  renderRankTable();
}
function getRankData(){
  return[...new Set(all.map(f=>f.user).filter(Boolean))].map(u=>{
    const fs=all.filter(f=>f.user===u);
    const extCnt=fs.reduce((a,f)=>{a[f.ext]=(a[f.ext]||0)+1;return a},{});
    const top=Object.entries(extCnt).sort((a,b)=>b[1]-a[1])[0];
    return{
      user:u,files:fs.length,
      contests:new Set(fs.map(f=>f.contest)).size,
      langs:new Set(fs.map(f=>f.ext)).size,
      topLang:top?top[0]:'',
      langSet:[...new Set(fs.map(f=>f.ext))],
    };
  });
}
function renderRankTable(){
  const data=getRankData();
  data.sort((a,b)=>{
    const diff=rankDir*(typeof a[rankSort]==='number'?b[rankSort]-a[rankSort]:a[rankSort].localeCompare(b[rankSort]));
    return diff||a.user.localeCompare(b.user);
  });
  const maxFiles=Math.max(1,...data.map(d=>d.files));
  const rankCls=i=>i===0?'gold':i===1?'silver':i===2?'bronze':'';
  const makeTh=(key,label)=>{
    const cls=rankSort===key?(rankDir===-1?'desc':'asc'):'';
    return`<th class="${cls}" onclick="setRankSort('${key}')">${label}</th>`;
  };
  const rows=data.map((d,i)=>{
    const chips=d.langSet.slice(0,5).map(e=>{const m=getLang(e);return`<span class="lang-chip-sm" style="background:${m.bg};color:${m.color}">${m.label}</span>`}).join('');
    return`<tr>
      <td class="rank-num ${rankCls(i)}">${i+1}</td>
      <td><div class="rank-user"><div class="rank-avatar">${d.user.slice(0,2).toUpperCase()}</div>${d.user}</div></td>
      <td><div class="rank-bar"><div class="rank-bar-track"><div class="rank-bar-fill" style="width:${(d.files/maxFiles*100).toFixed(0)}%"></div></div><span style="font-size:.82rem;font-weight:600;color:var(--text)">${d.files}</span></div></td>
      <td style="color:var(--text);font-size:.82rem">${d.contests}</td>
      <td><div class="lang-chips">${chips}</div></td>
    </tr>`;
  }).join('');
  document.getElementById('rankingsContent').innerHTML=`
    <table class="rank-table">
      <thead><tr>
        <th style="width:38px">#</th>
        ${makeTh('user','User')}
        ${makeTh('files','Files')}
        ${makeTh('contests','Contests')}
        <th>Languages</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}
function setRankSort(key){
  if(rankSort===key)rankDir*=-1;else{rankSort=key;rankDir=-1}
  renderRankTable();
}

/* ════ PROGRESS ═════════════════════════════════════ */
function buildProgress(){
  const users=[...new Set(all.map(f=>f.user).filter(Boolean))];
  const el=document.getElementById('progressContent');
  if(!users.length){
    el.innerHTML=`<div class="sbox-s"><span>ユーザーフォルダがありません。</span></div>`;
    return;
  }
  const contests=[...new Set(all.map(f=>f.contest))].sort((a,b)=>cmpContest(a,b));
  const matrix={};
  users.forEach(u=>{matrix[u]={};contests.forEach(c=>{matrix[u][c]=0})});
  all.forEach(f=>{if(f.user)matrix[f.user][f.contest]=(matrix[f.user][f.contest]||0)+1});
  const maxN=Math.max(1,...users.flatMap(u=>contests.map(c=>matrix[u][c])));
  function pgCls(n){return n===0?'pg-0':n===1?'pg-1':n===2?'pg-2':n<=4?'pg-3':'pg-hi'}
  const thRow=`<th class="corner"></th>`+contests.map(c=>`<th>${c}</th>`).join('');
  const bodyRows=users.map(u=>
    `<tr><td class="user-col">👤 ${u}</td>${contests.map(c=>{const n=matrix[u][c];return`<td class="${pgCls(n)}">${n||''}</td>`}).join('')}</tr>`
  ).join('');
  el.innerHTML=`
    <div class="pg-table-wrap"><table class="pg-table"><thead><tr>${thRow}</tr></thead><tbody>${bodyRows}</tbody></table></div>
    <div class="pg-legend">
      <span>0</span>
      <div class="pg-swatch" style="background:var(--panel);border:1px solid var(--border)"></div>
      <div class="pg-swatch" style="background:rgba(122,171,140,.22)"></div>
      <div class="pg-swatch" style="background:rgba(122,171,140,.42)"></div>
      <div class="pg-swatch" style="background:rgba(122,171,140,.62)"></div>
      <div class="pg-swatch" style="background:rgba(122,171,140,.82)"></div>
      <span>${maxN}+</span>
    </div>`;
}

/* ════ ERROR ════════════════════════════════════════ */
function showErr(msg){

    <strong>GitHub Pages での使い方</strong><br>
    <code>archive/files.json</code> にファイルパスの配列を用意してください：
    <code>["username/abc001-a.py", "username/cpp/abc003-c.cpp"]</code>
    <strong>生成スクリプト例</strong>（archive/ 内で実行）：

  document.getElementById('cardsWrap').className='';
  document.getElementById('cardsWrap').innerHTML='';
  showView('archive');
}

/* ════ PWA ══════════════════════════════════════════ */
(()=>{
  // Manifest をインラインで生成
  const manifest={
    name:'AtCoder Archive',
    short_name:'AtCoder',
    description:'競プロで解いたコードのアーカイブ',
    start_url:location.pathname,
    display:'standalone',
    background_color:'#f6f3ee',
    theme_color:'#c47f5e',
    icons:[
      {src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23c47f5e"/><text y=".9em" font-size="80" x="10">🏆</text></svg>',sizes:'any',type:'image/svg+xml'}
    ]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  document.getElementById('pwaManifest').href=URL.createObjectURL(blob);
  // インストールバナー
  let deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();deferredPrompt=e;
    const banner=document.getElementById('pwaBanner');
    if(banner)banner.style.display='flex';
  });
  window.addEventListener('appinstalled',()=>{
    const banner=document.getElementById('pwaBanner');
    if(banner)banner.style.display='none';
    deferredPrompt=null;
  });
  window.installPWA=()=>{
    if(!deferredPrompt)return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{deferredPrompt=null;const b=document.getElementById('pwaBanner');if(b)b.style.display='none'});
  };
  window.closePWABanner=()=>{const b=document.getElementById('pwaBanner');if(b)b.style.display='none'};
})();

init();
</script>
