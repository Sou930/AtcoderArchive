name: Generate archive/files.json

on:
  push:
    branches:
      - main  # mainブランチへのpush時に実行（必要に応じて変更）
    paths:
      - 'archive/**'  # archiveフォルダに変更があった時のみ実行

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ファイルをコミットするために必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate files.json
        run: |
          cd archive
          find . -type f \
            ! -name "space.txt" \
            ! -name "*.json" \
            | sed 's|^./||' \
            | sort \
            | python3 -c "
          import sys, json
          lines = [l.rstrip() for l in sys.stdin if l.strip()]
          print(json.dumps(lines, ensure_ascii=False, indent=2))
          " > files.json

      - name: Commit and push files.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/files.json
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: update archive/files.json"
          git push
